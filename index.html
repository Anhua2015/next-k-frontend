<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收筹池 · OI 监控 - Next K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0b0e11',
                        surface: '#141922',
                        'surface-light': '#1e2530',
                        border: '#2a3441',
                        'neon-green': '#00E396',
                        'neon-red': '#FF4560',
                        'neon-purple': '#7850FF',
                        'neon-blue': '#00B4D8',
                        'neon-yellow': '#FFE066',
                        'text-primary': '#FFFFFF',
                        'text-secondary': '#8A9AAD',
                        'text-muted': '#5A6B7D',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #0b0e11;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0b0e11; }
        ::-webkit-scrollbar-thumb { background: #2a3441; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5A6B7D; }
        ::selection { background: rgba(120, 80, 255, 0.3); }
        .card-hover {
            transition: all 0.2s;
        }
        .card-hover:hover {
            border-color: rgba(120, 80, 255, 0.5);
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.2);
        }
        /* 值得关注：置顶 + 强视觉 */
        .highlights-hero {
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.18) 0%, rgba(30, 37, 48, 0.98) 42%, rgba(0, 180, 216, 0.08) 100%);
            border: 1px solid rgba(120, 80, 255, 0.55);
            box-shadow:
                0 0 0 1px rgba(255, 224, 102, 0.12),
                0 0 48px rgba(120, 80, 255, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .highlights-hero .hl-title {
            background: linear-gradient(90deg, #fff 0%, #FFE066 45%, #00B4D8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="min-h-screen">
    <header class="sticky top-0 z-50 bg-background/95 backdrop-blur-sm border-b border-border">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-neon-purple to-neon-blue flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-text-primary tracking-tight">
                            Next <span class="text-neon-purple">K</span>
                            <span class="text-text-muted font-normal text-sm ml-2">· 收筹池 · OI 监控</span>
                        </h1>
                    </div>
                </div>
                <div id="connection-status" class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-neon-red/10 text-neon-red">
                    <span>连接中…</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="bg-surface rounded-xl border border-border overflow-hidden card-hover">
            <div class="px-4 py-3 border-b border-border flex flex-wrap items-center justify-between gap-2">
                <div>
                    <h2 class="text-text-primary font-semibold flex items-center gap-2">📊 收筹池 · OI 监控</h2>
                    <p class="text-text-muted text-xs mt-0.5">热度榜 · 追多 · 综合 · 埋伏（币安 U 本位 · 仅展示、不触发 Telegram）</p>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <span id="oi-radar-ts" class="text-text-muted text-xs font-mono">--</span>
                    <button type="button" onclick="loadAccumulationOiRadar({ forceRefresh: true })" id="oi-radar-refresh" class="px-3 py-1.5 rounded-lg bg-surface-light border border-border text-text-secondary text-xs font-medium hover:border-neon-purple/50 hover:text-neon-purple transition-colors">刷新</button>
                </div>
            </div>
            <div id="oi-radar-body" class="p-4">
                <div class="text-text-muted text-sm animate-pulse">加载中…</div>
            </div>
        </div>
    </main>

    <footer class="border-t border-border py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-text-muted text-xs">
            <p>Next K · 收筹池 · OI 监控</p>
            <p class="mt-1 text-text-muted/60">仅供研究参考，不构成投资建议</p>
        </div>
    </footer>

    <script>
        const API_BASE = (function resolveApiBase() {
            try {
                const q = new URLSearchParams(window.location.search).get('api');
                if (q) return String(q).replace(/\/$/, '');
            } catch (e) { /* ignore */ }
            try {
                const ls = localStorage.getItem('NEXT_K_API_BASE');
                if (ls) return String(ls).replace(/\/$/, '');
            } catch (e) { /* ignore */ }
            const h = window.location.hostname;
            const proto = window.location.protocol;
            if (h === 'localhost' || h === '127.0.0.1') {
                return 'http://127.0.0.1:8000';
            }
            if (proto === 'file:' || !h) {
                return 'http://127.0.0.1:8000';
            }
            return 'https://next-k-api-production.up.railway.app';
        })();

        const API = {
            async health() {
                const res = await fetch(`${API_BASE}/api/health`);
                return res.json();
            },
            async accumulationOiRadar() {
                const res = await fetch(`${API_BASE}/api/accumulation/oi-radar`);
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
            async accumulationOiRadarRefresh() {
                const res = await fetch(`${API_BASE}/api/accumulation/oi-radar/refresh`, { method: 'POST' });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            }
        };

        function escHtml(s) {
            if (s == null || s === '') return '';
            const d = document.createElement('div');
            d.textContent = String(s);
            return d.innerHTML;
        }

        function perpSymToChartSymbol(sym) {
            if (!sym || typeof sym !== 'string') return null;
            if (!sym.endsWith('USDT')) return null;
            const base = sym.slice(0, -4);
            return base + '/USDT';
        }

        function formatMcapUsd(v) {
            if (v == null || v === 0 || Number.isNaN(v)) return '--';
            const n = Number(v);
            if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
            if (n >= 1e6) return '$' + (n / 1e6).toFixed(0) + 'M';
            if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
            return '$' + n.toFixed(0);
        }

        function pxClass(px) {
            const n = Number(px);
            if (n > 0) return 'text-neon-green';
            if (n < 0) return 'text-neon-red';
            return 'text-text-muted';
        }

        function oiRadarHotTags(d) {
            const t = [];
            if (d.in_cg) t.push('<span class="text-neon-blue">🌐CG</span>');
            if (d.vol_surge) t.push('<span class="text-neon-yellow">📈放量</span>');
            if (Math.abs(Number(d.d6h) || 0) >= 3) {
                const v = Number(d.d6h);
                t.push('<span class="text-neon-purple">⚡OI' + (v >= 0 ? '+' : '') + v.toFixed(0) + '%</span>');
            }
            if (d.in_pool) t.push('<span class="text-text-secondary">💤池' + (Number(d.sw_days) || 0) + '天</span>');
            if (Number(d.fr_pct) < -0.03) t.push('<span class="text-neon-blue">🧊' + Number(d.fr_pct).toFixed(2) + '%</span>');
            return t.join(' ');
        }

        function oiRadarCard(title, emoji, innerHtml) {
            return `
                <div class="bg-surface-light/40 rounded-lg border border-border p-3 min-h-[120px]">
                    <div class="text-text-secondary text-xs font-medium uppercase tracking-wide mb-2 flex items-center gap-1.5">${emoji} ${escHtml(title)}</div>
                    <div class="space-y-1.5 text-sm">${innerHtml}</div>
                </div>`;
        }

        function oiRadarRowClickable(sym, innerLineHtml) {
            const chartSym = perpSymToChartSymbol(sym);
            if (!chartSym) return `<div class="text-xs text-text-secondary leading-relaxed py-0.5">${innerLineHtml}</div>`;
            const safe = chartSym.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
            return `<div role="button" tabindex="0" class="oi-radar-pick w-full text-left text-xs text-text-secondary leading-relaxed py-0.5 px-1 -mx-1 rounded hover:bg-surface-light/80 transition-colors cursor-pointer border border-transparent hover:border-border" data-chart-symbol="${safe}">${innerLineHtml}</div>`;
        }

        function onOiRadarPickSymbol(chartSymbol) {
            if (!chartSymbol) return;
            const perp = chartSymbol.replace('/', '').toUpperCase();
            const url = 'https://www.binance.com/zh-CN/futures/' + encodeURIComponent(perp);
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        function bindOiRadarPickHandlers(root) {
            if (!root) return;
            root.querySelectorAll('.oi-radar-pick[data-chart-symbol]').forEach((el) => {
                const go = () => onOiRadarPickSymbol(el.getAttribute('data-chart-symbol'));
                el.addEventListener('click', go);
                el.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter' || ev.key === ' ') {
                        ev.preventDefault();
                        go();
                    }
                });
            });
        }

        function fillOiRadarFromPayload(data, body, tsEl) {
            if (!body) return;
            tsEl.textContent = data.generated_at_cst || '';

            const hot = (data.hot_coins || []).slice(0, 8).map(d => {
                const px = Number(d.px_chg);
                const line = `<span class="font-semibold text-text-primary w-14 inline-block">${escHtml(d.coin)}</span> <span class="text-text-muted">${formatMcapUsd(d.est_mcap)}</span> <span class="${pxClass(px)}">${px >= 0 ? '+' : ''}${px.toFixed(0)}%</span> <span class="text-text-muted">|</span> ${oiRadarHotTags(d)}`;
                return oiRadarRowClickable(d.sym, line);
            }).join('') || '<div class="text-text-muted text-xs">暂无热度标的</div>';

            const chase = (data.chase || []).slice(0, 8).map(d => {
                const px = Number(d.px_chg);
                const line = `<span class="font-semibold text-text-primary w-16 inline-block">${escHtml(d.coin)}</span> <span class="text-neon-blue font-mono">${Number(d.fr_pct).toFixed(3)}%</span> <span class="text-text-muted">${escHtml(d.trend || '')}</span> <span class="text-text-muted">|</span> <span class="${pxClass(px)}">${px >= 0 ? '+' : ''}${px.toFixed(0)}%</span> <span class="text-text-muted">|</span> <span class="text-text-muted">${formatMcapUsd(d.est_mcap)}</span>`;
                return oiRadarRowClickable(d.sym, line);
            }).join('') || '<div class="text-text-muted text-xs">暂无追多标的</div>';

            const combined = (data.combined || []).slice(0, 8).map(d => {
                const dims = [];
                if (d.f_sc >= 10) dims.push('<span class="text-neon-blue">🧊' + Number(d.fr_pct).toFixed(2) + '%</span>');
                if (d.m_sc >= 12) dims.push('<span class="text-neon-yellow">💎' + formatMcapUsd(d.est_mcap) + '</span>');
                if (d.s_sc >= 10) dims.push('<span class="text-text-secondary">💤' + (Number(d.sw_days) || 0) + '天</span>');
                if (d.o_sc >= 10) dims.push('<span class="text-neon-purple">⚡OI' + (Number(d.d6h) >= 0 ? '+' : '') + Number(d.d6h).toFixed(0) + '%</span>');
                const line = `<span class="font-semibold text-text-primary w-14 inline-block">${escHtml(d.coin)}</span> <span class="text-neon-green font-mono">${Number(d.total).toFixed(0)}分</span> <span class="text-text-muted">|</span> ${dims.join(' ')}`;
                return oiRadarRowClickable(d.sym, line);
            }).join('') || '<div class="text-text-muted text-xs">暂无综合上榜</div>';

            const ambush = (data.ambush || []).slice(0, 8).map(d => {
                const dark = Number(d.d6h) > 2 && Math.abs(Number(d.px_chg)) < 5;
                const parts = [
                    '<span class="text-text-muted">' + formatMcapUsd(d.est_mcap) + '</span>',
                    '<span class="text-neon-purple">OI' + (Number(d.d6h) >= 0 ? '+' : '') + Number(d.d6h).toFixed(0) + '%</span>'
                ];
                if (dark) parts.push('<span class="text-neon-yellow">🎯暗流</span>');
                if (Number(d.sw_days) >= 45) parts.push('<span class="text-text-secondary">横盘' + Number(d.sw_days).toFixed(0) + '天</span>');
                if (Number(d.fr_pct) < -0.01) parts.push('<span class="text-neon-blue">费率' + Number(d.fr_pct).toFixed(2) + '%</span>');
                const line = `<span class="font-semibold text-text-primary w-14 inline-block">${escHtml(d.coin)}</span> <span class="text-neon-green font-mono">${Number(d.total).toFixed(0)}分</span> <span class="text-text-muted">|</span> ${parts.join(' ')}`;
                return oiRadarRowClickable(d.sym, line);
            }).join('') || '<div class="text-text-muted text-xs">暂无埋伏标的</div>';

            const highlights = (data.highlights || []).map(h =>
                `<div class="flex items-start gap-3 text-sm md:text-base text-text-primary leading-snug py-1 border-b border-border/40 last:border-0"><span class="text-neon-yellow text-lg shrink-0 leading-none mt-0.5">▸</span><span class="font-medium">${escHtml(h)}</span></div>`
            ).join('') || '<div class="text-text-muted text-sm py-2">暂无提醒</div>';

            const legend = `
                <div class="mt-4 pt-3 border-t border-border text-text-muted text-[11px] leading-relaxed space-y-0.5">
                    <div class="font-medium text-text-secondary mb-1">📖 图例</div>
                    <div>热度 = CG 热搜 + 成交量暴增（OI 领先指标）</div>
                    <div>费率负 = 空头燃料 · 💎 市值 · 💤 横盘（吸筹）</div>
                    <div>🔥💤 热度+吸筹 = 最强预判 · 🔥⚡ 热度+OI = 正在发生</div>
                    <div class="mt-2 text-neon-blue/90">点击标的可在新标签页打开币安合约</div>
                </div>`;

            body.innerHTML = `
                <div class="highlights-hero rounded-xl p-4 md:p-6 mb-6 -mx-1 md:mx-0">
                    <div class="flex flex-wrap items-end gap-3 mb-1">
                        <div class="flex items-center gap-2">
                            <span class="text-3xl leading-none" aria-hidden="true">💡</span>
                            <h3 class="hl-title text-xl md:text-2xl font-extrabold tracking-tight">值得关注</h3>
                        </div>
                        <span class="text-xs text-neon-yellow/90 font-medium uppercase tracking-wider">优先信号</span>
                    </div>
                    <p class="text-text-muted text-xs mb-4">综合热度、费率、收筹池与 OI 的交叉提示</p>
                    <div class="space-y-0">${highlights}</div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    ${oiRadarCard('热度榜', '🔥', hot)}
                    ${oiRadarCard('追多（按费率）', '🔥', chase)}
                    ${oiRadarCard('综合', '📊', combined)}
                    ${oiRadarCard('埋伏', '🎯', ambush)}
                </div>
                ${legend}
            `;
            bindOiRadarPickHandlers(body);
        }

        async function runOiRadarBackgroundPoll(body, tsEl) {
            const j = await API.accumulationOiRadarRefresh();
            if (!j.accepted) {
                if (j.busy) {
                    body.innerHTML = '<div class="text-neon-yellow text-sm">已有扫描在运行，请约 1–2 分钟后再点刷新。</div>';
                }
                return;
            }
            for (let i = 0; i < 45; i++) {
                body.innerHTML = `<div class="text-text-muted text-sm py-3">后台扫描中（约 1–2 分钟）… 已等待 ${i + 1}/45 轮</div>`;
                await new Promise((r) => setTimeout(r, 4000));
                const data = await API.accumulationOiRadar();
                if (data && data.ok) {
                    fillOiRadarFromPayload(data, body, tsEl);
                    return;
                }
            }
            body.innerHTML = '<div class="text-neon-yellow text-sm">扫描较久仍未写入快照，请稍后再试或查看后端日志。</div>';
        }

        async function loadAccumulationOiRadar(options = {}) {
            const forceRefresh = options.forceRefresh === true;
            const body = document.getElementById('oi-radar-body');
            const tsEl = document.getElementById('oi-radar-ts');
            const btn = document.getElementById('oi-radar-refresh');
            if (!body) return;
            if (btn) btn.disabled = true;

            try {
                if (forceRefresh) {
                    tsEl.textContent = '…';
                    await runOiRadarBackgroundPoll(body, tsEl);
                    return;
                }

                tsEl.textContent = '…';
                body.innerHTML = '<div class="text-text-muted text-sm animate-pulse py-2">加载快照…</div>';
                const data = await API.accumulationOiRadar();

                if (data.ok) {
                    fillOiRadarFromPayload(data, body, tsEl);
                    return;
                }

                tsEl.textContent = '';
                if (data.error === 'no_snapshot') {
                    body.innerHTML = `<div class="rounded-lg border border-neon-yellow/30 bg-neon-yellow/5 p-3 text-sm text-neon-yellow">${escHtml(data.message || '尚无快照')}</div><p class="text-text-muted text-xs mt-2">正在启动后台扫描并自动轮询（约 1–2 分钟）…</p>`;
                    await runOiRadarBackgroundPoll(body, tsEl);
                    return;
                }

                body.innerHTML = `<div class="rounded-lg border border-neon-yellow/30 bg-neon-yellow/5 p-3 text-sm text-neon-yellow">${escHtml(data.message || data.error || '暂无数据')}</div>`;
            } catch (e) {
                console.error('OI radar:', e);
                tsEl.textContent = '';
                const msg = e && e.message ? String(e.message) : '加载失败';
                const hint = /fail(ed)? to fetch|networkerror|load failed/i.test(msg)
                    ? '<p class="text-text-muted text-xs mt-2">请确认 API 可访问（本页默认直连 Railway；本机可加 <code class="text-neon-blue">?api=http://127.0.0.1:8000</code>）。</p>'
                    : '';
                body.innerHTML = `<div class="text-neon-red text-sm">${escHtml(msg)}</div>${hint}`;
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        async function init() {
            const conn = document.getElementById('connection-status');
            try {
                await API.health();
                conn.className = 'flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-neon-green/10 text-neon-green';
                conn.innerHTML = '<span>API 已连接</span>';
            } catch (e) {
                conn.className = 'flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-neon-red/10 text-neon-red';
                conn.innerHTML = '<span>API 连接失败</span>';
            }
            loadAccumulationOiRadar();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
