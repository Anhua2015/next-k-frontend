<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next K · 总览</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { serif: ['"Noto Serif SC"', 'Georgia', 'serif'], sans: ['"Source Sans 3"', 'system-ui', 'sans-serif'] },
                colors: {
                    background: 'var(--bg)', surface: 'var(--surface)', 'surface-light': 'var(--surface-light)',
                    border: 'var(--border)', accent: 'var(--accent)', 'neon-green': 'var(--neon-green)',
                    'neon-red': 'var(--neon-red)', 'neon-purple': 'var(--neon-purple)',
                    'neon-blue': 'var(--neon-blue)', 'neon-yellow': 'var(--neon-yellow)', warn: 'var(--warn)',
                    'text-primary': 'var(--text-primary)', 'text-secondary': 'var(--text-secondary)', 'text-muted': 'var(--text-muted)',
                }
            }}
        }
    </script>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen">
<header class="sticky top-0 z-50 bg-surface/92 backdrop-blur-md border-b border-border shadow-[0_1px_0_rgba(232,228,216,0.9)_inset]">
    <div class="max-w-7xl mx-auto px-4 py-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-accent to-accent/80 shadow-[0_4px_14px_-4px_rgba(142,74,73,0.28)] flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-text-primary tracking-tight font-serif">Next <span class="text-accent">K</span></h1>
            </div>
            <div class="flex items-center gap-1.5 bg-surface-light rounded-lg p-1 border border-border/70">
                <a href="index.html" class="px-3 py-1.5 rounded-md text-xs font-semibold bg-accent/12 text-accent">总览</a>
                <a href="research.html" class="px-3 py-1.5 rounded-md text-xs font-medium text-text-secondary hover:text-accent hover:bg-accent/[0.06] transition-colors">研究</a>
                <a href="live.html" class="px-3 py-1.5 rounded-md text-xs font-medium text-text-secondary hover:text-accent hover:bg-accent/[0.06] transition-colors">实盘</a>
            </div>
            <div class="flex items-center gap-2">
                <button type="button" onclick="toggleTheme()" class="theme-toggle" title="切换主题" id="theme-btn">☽</button>
                <div id="connection-status" class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-neon-red/[0.09] text-neon-red border border-neon-red/15">
                    <span>连接中…</span>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-6">
    <!-- 首屏：值得关注 + S2 费率转负 -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6 items-stretch" aria-label="优先信号">
        <div id="oi-radar-highlights-slot" class="min-h-0 min-w-0 flex flex-col">
            <div class="highlights-hero rounded-xl p-4 md:p-5 flex-1 flex flex-col justify-center">
                <div class="text-text-muted text-sm animate-pulse">加载值得关注…</div>
            </div>
        </div>
        <div class="bg-surface rounded-xl border border-border overflow-hidden card-hover flex flex-col min-h-[200px] min-w-0 lg:max-h-[min(520px,calc(100vh-220px))]">
            <div class="px-4 py-3 border-b border-border/90 bg-surface-light/[0.35] flex flex-wrap items-center justify-between gap-2 shrink-0">
                <div><h2 class="text-text-primary font-semibold font-serif flex items-center gap-2 tracking-tight">⚡ 费率转负 + OI 涨</h2><p class="text-text-muted text-xs mt-0.5">近 2 日</p></div>
                <div class="flex items-center gap-2 shrink-0">
                    <span id="s2-signals-ts" class="text-text-muted text-xs font-mono">--</span>
                    <button type="button" onclick="loadS2FundingSignals()" id="s2-signals-refresh" class="btn-secondary px-3 py-1.5 rounded-lg bg-surface-light/80 border border-border/90 text-text-secondary text-xs font-medium hover:border-accent/40 hover:text-accent">刷新</button>
                </div>
            </div>
            <div id="s2-signals-body" class="p-4 overflow-x-auto overflow-y-auto flex-1 min-h-0">
                <div class="text-text-muted text-sm animate-pulse">加载中…</div>
            </div>
        </div>
    </section>

    <!-- 收筹池 OI 监控 -->
    <section class="mb-6" aria-label="收筹池 OI 监控" id="oi-lane-section">
        <div class="bg-surface rounded-xl border border-border overflow-hidden card-hover min-w-0">
            <div class="px-4 py-3 border-b border-border/90 bg-surface-light/[0.35] flex flex-wrap items-center justify-between gap-2">
                <div><h2 class="text-text-primary font-semibold font-serif flex items-center gap-2 tracking-tight">📊 收筹池 · OI 监控</h2></div>
                <div class="flex items-center gap-2 shrink-0">
                    <span id="oi-radar-ts" class="text-text-muted text-xs font-mono">--</span>
                    <button type="button" onclick="loadAccumulationOiRadar({ forceRefresh: true })" id="oi-radar-refresh" class="btn-secondary px-3 py-1.5 rounded-lg bg-surface-light/80 border border-border/90 text-text-secondary text-xs font-medium hover:border-accent/40 hover:text-accent">刷新</button>
                </div>
            </div>
            <div id="oi-radar-body" class="p-4 overflow-x-auto">
                <div class="text-text-muted text-sm animate-pulse">加载中…</div>
            </div>
        </div>
    </section>

    <!-- 火药桶雷达 -->
    <section class="mb-6" id="powder-keg-section">
        <div class="bg-surface rounded-xl border border-border overflow-hidden card-hover min-w-0">
            <div class="px-4 py-3 border-b border-border/90 bg-surface-light/[0.35] flex flex-wrap items-center justify-between gap-2">
                <div><h2 class="text-text-primary font-semibold font-serif tracking-tight">🧨 火药桶雷达</h2><p class="text-text-muted text-xs mt-0.5">多周期 VWAP 信号 · Top5</p></div>
                <div class="flex items-center gap-2 shrink-0"><span id="pk-ts" class="text-text-muted text-xs font-mono">--</span></div>
            </div>
            <div id="pk-body" class="p-4 overflow-x-auto"><div class="text-text-muted text-sm animate-pulse">加载中…</div></div>
        </div>
    </section>

    <!-- Top Trader 大户 -->
    <section class="mb-6" id="top-trader-section">
        <div class="bg-surface rounded-xl border border-border overflow-hidden card-hover min-w-0">
            <div class="px-4 py-3 border-b border-border/90 bg-surface-light/[0.35] flex flex-wrap items-center justify-between gap-2">
                <div><h2 class="text-text-primary font-semibold font-serif tracking-tight">🐋 大户追踪</h2><p class="text-text-muted text-xs mt-0.5">15m 多空比</p></div>
                <div class="flex items-center gap-2 shrink-0"><span id="tt-ts" class="text-text-muted text-xs font-mono">--</span></div>
            </div>
            <div id="tt-body" class="p-4 overflow-x-auto"><div class="text-text-muted text-sm animate-pulse">加载中…</div></div>
        </div>
    </section>
</main>

<footer class="border-t border-border py-6 mt-auto select-none">
    <div class="max-w-7xl mx-auto px-4 text-center text-text-muted text-xs">
        <p id="footer-brand-line" class="cursor-default">Next K</p>
        <p class="mt-1 text-text-muted/60">仅供研究参考，不构成投资建议</p>
    </div>
</footer>

<!-- 维护面板 -->
<div id="maint-panel" class="hidden fixed inset-x-0 bottom-0 z-[70] border-t border-border bg-surface/98 backdrop-blur-md shadow-[0_-12px_40px_rgba(74,74,74,0.12)] max-h-[min(88vh,920px)] overflow-y-auto">
    <div class="max-w-7xl mx-auto px-4 py-3 pb-6" id="maint-panel-inner"></div>
</div>

<script src="api-base.js"></script>
<script src="js/ui.js" defer></script>
<script src="js/app.js" defer></script>
</body>
</html>
