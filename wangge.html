<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Next K · 网格总控台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="theme.css" />
  <script src="api-base.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      color: var(--text-primary);
      font-family: "Source Sans 3", system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .bar {
      display: flex; align-items: center; gap: 14px;
      padding: 0 16px; height: 48px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(10px);
      font-size: 13px;
    }
    .bar a { color: var(--text-muted); text-decoration: none; }
    .bar a:hover { color: var(--gold); }
    .bar strong {
      font-family: "Noto Serif SC", Georgia, serif;
      font-weight: 600; color: var(--text-primary);
    }
    .bar .hint { margin-left: auto; color: var(--text-muted); font-size: 11px; }
    .bar .open {
      color: var(--gold); border: 1px solid color-mix(in srgb, var(--gold) 40%, transparent);
      padding: 4px 10px; border-radius: var(--radius-md); font-size: 12px;
    }
    .bar .open:hover { background: var(--gold-soft); }
    iframe {
      width: 100%; height: calc(100% - 48px); border: 0; display: block;
      background: var(--bg);
    }
  </style>
</head>
<body class="dark">
  <div class="bar">
    <a href="index.html">← 策略看板</a>
    <strong>网格交易总控台</strong>
    <span class="hint" id="hint">加载中…</span>
    <a class="open" id="openRaw" href="#" target="_blank" rel="noopener">新窗口打开</a>
  </div>
  <iframe id="frame" title="wangge" src="about:blank"></iframe>
  <script>
    const base = (typeof resolveProtocolBase === 'function'
      ? resolveProtocolBase() : 'http://127.0.0.1:8001').replace(/\/$/, '');
    const url = base + '/';
    document.getElementById('hint').textContent = base;
    document.getElementById('openRaw').href = url;
    document.getElementById('frame').src = url;
  </script>
</body>
</html>
