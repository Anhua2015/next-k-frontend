name: Test and Deploy

on:
  push:
    branches: [release]

permissions:
  contents: read

concurrency:
  group: next-k-frontend-release-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        run: |
          node --check api-base.js
          node --check binance-api-base.js
          node tools/check-inline-js.mjs

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy release to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/next-k/next-k-frontend
            git fetch origin release
            git checkout release
            git reset --hard origin/release
            bash stop.sh
            bash start.sh
