name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        run: |
          node --check api-base.js
          node --check binance-api-base.js
          node tools/check-inline-js.mjs
