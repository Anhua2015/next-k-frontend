<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实盘看板 · Next K</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="theme.css" />
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif SC"', 'Georgia', 'serif'],
                        sans: ['"Source Sans 3"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        background: 'var(--bg)',
                        surface: 'var(--surface)',
                        'surface-light': 'var(--surface-light)',
                        border: 'var(--border)',
                        accent: 'var(--accent)',
                        'neon-green': 'var(--neon-green)',
                        'neon-red': 'var(--neon-red)',
                        'neon-purple': 'var(--neon-purple)',
                        'neon-blue': 'var(--neon-blue)',
                        'neon-yellow': 'var(--neon-yellow)',
                        warn: 'var(--warn)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                        'text-muted': 'var(--text-muted)',
                    },
                    borderRadius: {
                        sm: '0.125rem',
                        DEFAULT: '0.2rem',
                        md: '0.25rem',
                        lg: '0.375rem',
                        xl: '0.5rem',
                        '2xl': '0.625rem',
                        '3xl': '0.75rem',
                    },
                }
            }
        }
    </script>
    <style>
        :root {
            /* tokens in theme.css — local aliases only */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
        }
        .card {
            transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
            box-shadow: var(--card-shadow);
            border-radius: var(--radius-lg);
        }
        .card:hover {
            border-color: color-mix(in srgb, var(--gold) 22%, var(--border));
            box-shadow: var(--card-shadow-hover);
        }
        .btn-secondary { transition: border-color 0.15s ease, color 0.15s ease, background-color 0.15s ease; }
        .pnl-pos { color: var(--neon-green); }
        .pnl-neg { color: var(--neon-red); }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.1rem 0.45rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .badge-open    { background: color-mix(in srgb, var(--neon-green) 15%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 28%, transparent); }
        .badge-closed  { background: color-mix(in srgb, var(--text-muted) 12%, transparent); color: var(--text-secondary); border: 1px solid color-mix(in srgb, var(--text-muted) 22%, transparent); }
        .badge-long    { background: color-mix(in srgb, var(--neon-green) 12%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 25%, transparent); }
        .badge-short   { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-tp      { background: color-mix(in srgb, var(--neon-green) 12%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 25%, transparent); }
        .badge-sl      { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-expired { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }
        .badge-manual  { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); }
        .badge-unknown { background: color-mix(in srgb, var(--text-muted) 10%, transparent); color: var(--text-muted); border: 1px solid color-mix(in srgb, var(--text-muted) 20%, transparent); }
        .badge-enabled  { background: color-mix(in srgb, var(--neon-green) 15%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 28%, transparent); }
        .badge-disabled { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-testnet  { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }
        table { border-collapse: collapse; width: 100%; }
        th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 0.55rem 0.75rem; font-size: 0.78rem; border-bottom: 1px solid color-mix(in srgb, var(--border) 90%, transparent); white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--hover-bg); }
        .config-input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.35rem 0.6rem;
            font-size: 0.78rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s;
        }
        .config-input:focus { border-color: color-mix(in srgb, var(--accent) 45%, transparent); }
        select.config-input { appearance: auto; cursor: pointer; }
        .tab-btn { transition: color 0.15s, border-color 0.15s; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .tab-btn:not(.active) { color: var(--text-muted); border-bottom: 2px solid transparent; }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.6rem 1.1rem;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
            z-index: 999;
            animation: fadein 0.2s ease;
        }
        .toast-ok  { background: color-mix(in srgb, var(--neon-green) 15%, transparent); border: 1px solid color-mix(in srgb, var(--neon-green) 30%, transparent); color: var(--neon-green); }
        .toast-err { background: color-mix(in srgb, var(--neon-red) 15%, transparent); border: 1px solid color-mix(in srgb, var(--neon-red) 30%, transparent); color: var(--neon-red); }
        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-light);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
        @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="app-header sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-2.5">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-4 min-w-0">
                <a href="index.html" class="flex items-center gap-2.5 shrink-0 group">
                    <div class="brand-mark" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <span class="brand-title text-text-primary group-hover:text-accent transition-colors">Next <span class="text-accent">K</span></span>
                        <div class="brand-subtitle hidden sm:block">Live Terminal</div>
                    </div>
                </a>
                <nav class="hidden md:flex items-center gap-1.5" aria-label="主导航">
                    <a href="index.html" class="nav-pill">策略看板</a>
                    <a href="binance.html" class="nav-pill nav-pill-active" aria-current="page">实盘看板</a>
                </nav>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <span id="header-et-clock" class="header-clock hidden lg:inline" title="美东时间">--:-- ET</span>
                <button type="button" onclick="toggleTheme()" class="theme-toggle" title="切换主题" id="theme-btn">☽</button>
                <button type="button" onclick="refreshAll()" class="btn-ghost">刷新</button>
                <div id="status-badge" class="status-pill status-pill-err bg-neon-red/[0.08] text-neon-red border-neon-red/20">
                    <span class="status-dot"></span><span>离线</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div id="toast-container"></div>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-5">

    <!-- Status + Config row -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">

        <!-- Status card -->
        <div class="bg-surface rounded-xl border border-border card p-4">
            <div class="flex items-center justify-between mb-3">
                <div>
                    <div class="panel-kicker">System</div>
                    <h2 class="panel-title mt-1">系统状态</h2>
                </div>
            </div>
            <div id="status-body" class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                <div class="text-text-muted text-xs animate-pulse col-span-3">加载中…</div>
            </div>
        </div>

        <!-- Binance config editor -->
        <div class="bg-surface rounded-xl border border-border card p-4">
            <div class="flex items-center justify-between mb-3">
                <div>
                    <div class="panel-kicker">Config</div>
                    <h2 class="panel-title mt-1">交易配置</h2>
                </div>
                <button id="btn-save-config" type="button" onclick="saveConfig()" class="btn-secondary px-2.5 py-1 rounded-lg bg-accent/15 border border-accent/30 text-accent text-xs font-medium hover:bg-accent/25 disabled:opacity-50 disabled:cursor-not-allowed">保存配置</button>
            </div>
            <div class="flex items-center gap-0 mb-3 border-b border-border/90" id="config-tabs">
                <button type="button" class="tab-btn active px-3 py-1.5 text-xs font-medium" data-tab="global" onclick="switchConfigTab('global')">全局</button>
            </div>
            <div id="config-body" class="grid grid-cols-2 gap-x-4 gap-y-2">
                <div class="text-text-muted text-xs animate-pulse col-span-2">加载中…</div>
            </div>
        </div>
    </section>

    <!-- Open positions -->
    <section class="bg-surface rounded-xl border border-border card overflow-hidden">
        <div class="px-4 py-3 border-b border-border/90 bg-surface-light/[0.35] flex items-center justify-between">
            <h2 class="text-text-primary font-semibold text-sm">当前持仓</h2>
            <span id="open-pos-count" class="text-text-muted text-xs">—</span>
        </div>
        <div class="overflow-x-auto">
            <div id="open-positions-body" class="p-4">
                <div class="text-text-muted text-xs animate-pulse">加载中…</div>
            </div>
        </div>
    </section>

    <!-- Signal log -->
    <section class="bg-surface rounded-xl border border-border card overflow-hidden">
        <div class="px-4 py-3 border-b border-border/90 bg-surface-light/[0.35] flex items-center justify-between">
            <h2 class="text-text-primary font-semibold text-sm">信号日志</h2>
            <button type="button" onclick="loadSignals()" class="btn-secondary px-2.5 py-1 rounded-lg bg-surface-light/80 border border-border/90 text-text-muted text-xs hover:border-accent/40 hover:text-accent">刷新</button>
        </div>
        <div class="overflow-x-auto">
            <div id="signals-body" class="p-4">
                <div class="text-text-muted text-xs animate-pulse">加载中…</div>
            </div>
        </div>
    </section>

</main>

<script src="binance-api-base.js"></script>
<script>
function getApiBase() { return resolveProtocolApiBase(); }
function buildHeaders() {
    return { 'Content-Type': 'application/json' };
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg, ok) {
    const el = document.createElement('div');
    el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// ── API fetch ─────────────────────────────────────────────────────────────────

async function apiFetch(path, opts) {
    const url = getApiBase() + path;
    const res = await fetch(url, { headers: buildHeaders(), ...(opts || {}) });
    if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(res.status + ' ' + body);
    }
    return res.json();
}

// ── Countdown ─────────────────────────────────────────────────────────────────

let _countdownTimer = null;

function startCountdowns() {
    if (_countdownTimer) clearInterval(_countdownTimer);
    _countdownTimer = setInterval(tickCountdowns, 1000);
}

function tickCountdowns() {
    document.querySelectorAll('[data-expire]').forEach(function(el) {
        const expStr = el.dataset.expire;
        if (!expStr) return;
        const diff = Math.floor((new Date(expStr) - new Date()) / 1000);
        if (diff <= 0) {
            el.textContent = '已过期';
            el.style.color = '#e07884';
            return;
        }
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        el.textContent = h + 'h ' + String(m).padStart(2, '0') + 'm ' + String(s).padStart(2, '0') + 's';
        el.style.color = diff < 600 ? '#c9a66b' : '#94a3b8';
    });
}

// ── Formatters ────────────────────────────────────────────────────────────────

function escHtml(v) {
    if (v == null) return '';
    return String(v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function fmtTime(iso) {
    if (!iso) return '—';
    try {
        return new Date(iso).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false }).replace(/\//g, '-');
    } catch(e) {
        return iso;
    }
}

function fmtNum(v, decimals) {
    if (v == null) return '—';
    return Number(v).toFixed(decimals != null ? decimals : 4);
}

function pnlColor(v) {
    if (v == null) return '';
    return Number(v) >= 0 ? 'color:var(--neon-green)' : 'color:var(--neon-red)';
}

function sideBadge(side) {
    if (!side) return '—';
    var cls = String(side).toLowerCase() === 'long' ? 'badge-long' : 'badge-short';
    return '<span class="badge ' + cls + '">' + escHtml(side) + '</span>';
}

function reasonBadge(r) {
    if (!r) return '—';
    var labels = {
        tp: '止盈', sl: '止损', expired: '到期', manual: '手动', unknown: '未知',
        paper_close: '纸面平仓', external: '外部平仓',
        momentum_scan: '动量调仓', momentum_trail: '动量移动止盈',
        jiezhen_scan: '接针调仓', jiezhen_trail: '接针移动止盈',
    };
    // 解析 "momentum_scan/trail_tier1" 格式
    var parts = String(r).split('/');
    var sourcePart = parts[0] || '';
    var rulePart = parts[1] || '';
    var ruleLabels = {
        trail_tier1: '止盈一档', trail_tier2: '止盈二档',
        trail_low: '低档保护', trail_stop: '硬止损',
        rotate: '换仓', expired: '到期',
    };
    // class 白名单：只允许已知 key 进入 class 属性
    var BADGE_CLASS_WHITELIST = {
        tp: 1, sl: 1, expired: 1, manual: 1, unknown: 1,
        paper_close: 1, external: 1,
        momentum_scan: 1, momentum_trail: 1,
        jiezhen_scan: 1, jiezhen_trail: 1,
        trail_tier1: 1, trail_tier2: 1,
        trail_low: 1, trail_stop: 1,
        rotate: 1,
    };
    var sourceLabel = labels[sourcePart] || sourcePart;
    var ruleLabel = ruleLabels[rulePart] || rulePart;
    var display = ruleLabel ? sourceLabel + '/' + ruleLabel : sourceLabel;
    var rawClassKey = rulePart || sourcePart;
    var classKey = BADGE_CLASS_WHITELIST[rawClassKey] ? rawClassKey : 'unknown';
    return '<span class="badge badge-' + classKey + '">' + escHtml(display) + '</span>';
}

function signalStatusBadge(s) {
    if (!s) return '—';
    var cls = s === 'traded' ? 'badge-open' : s === 'error' ? 'badge-sl' : 'badge-unknown';
    var labels = { traded: '已开仓', received: '已收到', error: '错误' };
    return '<span class="badge ' + cls + '">' + escHtml(labels[s] || s) + '</span>';
}

// ── Status ────────────────────────────────────────────────────────────────────

function setBinanceStatusPill(el, state, text) {
    var classes = {
        ok: 'status-pill status-pill-ok bg-neon-green/[0.08] text-neon-green border-neon-green/20',
        warn: 'status-pill status-pill-warn bg-neon-yellow/[0.08] text-neon-yellow border-neon-yellow/22',
        err: 'status-pill status-pill-err bg-neon-red/[0.08] text-neon-red border-neon-red/20',
    };
    el.className = classes[state] || classes.err;
    el.innerHTML = '<span class="status-dot"></span><span>' + text + '</span>';
}

function tickHeaderClock() {
    var el = document.getElementById('header-et-clock');
    if (!el) return;
    try {
        var parts = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/New_York',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
        }).formatToParts(new Date());
        var h = (parts.find(function(p) { return p.type === 'hour'; }) || {}).value || '--';
        var m = (parts.find(function(p) { return p.type === 'minute'; }) || {}).value || '--';
        el.textContent = h + ':' + m + ' ET';
    } catch (e) {
        el.textContent = '--:-- ET';
    }
}

async function loadStatus() {
    try {
        var d = await apiFetch('/api/binance/status');
        var enabled = d.enabled === 'true' || d.enabled === true;
        var testnet  = d.testnet  === 'true' || d.testnet  === true;

        var badge = document.getElementById('status-badge');
        if (badge) {
            if (!enabled) {
                setBinanceStatusPill(badge, 'err', '已禁用');
            } else if (testnet) {
                setBinanceStatusPill(badge, 'warn', 'TESTNET');
            } else {
                setBinanceStatusPill(badge, 'ok', '实盘');
            }
        }

        var items = [
            ['状态',     enabled ? '<span class="badge badge-enabled">启用</span>' : '<span class="badge badge-disabled">禁用</span>'],
            ['网络',     testnet  ? '<span class="badge badge-testnet">Testnet</span>' : '<span class="text-text-secondary text-xs">主网</span>'],
            ['当前持仓', '<span style="font-variant-numeric:tabular-nums" class="text-text-primary font-mono">' + (d.open_positions != null ? d.open_positions : '—') + '</span>'],
            ['最大持仓', '<span class="text-text-primary font-mono">' + (d.max_positions || '—') + '</span>'],
        ];

        document.getElementById('status-body').innerHTML = items.map(function(item) {
            return '<div class="flex flex-col gap-0.5">'
                + '<span class="text-text-muted text-[10px] uppercase tracking-wider">' + item[0] + '</span>'
                + '<div class="text-xs">' + item[1] + '</div>'
                + '</div>';
        }).join('');
    } catch(e) {
        document.getElementById('status-body').innerHTML =
            '<div class="col-span-3" style="color:var(--neon-red);font-size:0.75rem">无法连接：' + e.message + '</div>';
        var badge = document.getElementById('status-badge');
        if (badge) setBinanceStatusPill(badge, 'err', '离线');
    }
}

// ── Config editor ─────────────────────────────────────────────────────────────

var _configTab = 'global';
var EDITABLE_KEYS = {
    global: [
        { key: 'enabled',               label: '启用交易',        hint: 'true / false' },
        { key: 'testnet',               label: '测试网',          hint: 'true / false' },
        { key: 'max_positions',         label: '最大持仓(总)',     hint: '8' },
        { key: 'entry_type',            label: '入场单类型(默认)', hint: 'MARKET', type: 'select', options: ['MARKET','LIMIT'] },
    ],
};

function switchConfigTab(tab) {
    _configTab = tab;
    var btns = document.querySelectorAll('#config-tabs .tab-btn');
    btns.forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-tab') === tab);
    });
    for (var k in EDITABLE_KEYS) {
        if (!EDITABLE_KEYS.hasOwnProperty(k)) continue;
        var el = document.getElementById('config-section-' + k);
        if (el) el.style.display = (k === tab) ? '' : 'none';
    }
}

function _allConfigKeys() {
    var all = [];
    for (var k in EDITABLE_KEYS) {
        if (EDITABLE_KEYS.hasOwnProperty(k)) {
            all = all.concat(EDITABLE_KEYS[k]);
        }
    }
    return all;
}

async function loadConfig() {
    try {
        var cfg = await apiFetch('/api/binance/config');
        var sections = [];
        for (var tab in EDITABLE_KEYS) {
            if (!EDITABLE_KEYS.hasOwnProperty(tab)) continue;
            var keys = EDITABLE_KEYS[tab];
            var display = (tab === _configTab) ? '' : 'display:none';
            var items = keys.map(function(item) {
                var raw = cfg[item.key] != null ? cfg[item.key] : '';
                var val = (item.password && raw === '****') ? '' : raw;
                var control;
                if (item.type === 'select') {
                    var opts = (item.options || []).map(function(o) {
                        var label = o === '' ? '（回退全局）' : o;
                        var sel = String(val) === String(o) ? ' selected' : '';
                        return '<option value="' + escHtml(o) + '"' + sel + '>' + escHtml(label) + '</option>';
                    }).join('');
                    control = '<select id="cfg-' + escHtml(item.key) + '" class="config-input">' + opts + '</select>';
                } else {
                    var inputType = item.password ? 'password' : 'text';
                    control = '<input id="cfg-' + escHtml(item.key) + '" type="' + inputType + '" value="' + escHtml(val) + '" placeholder="' + escHtml(item.hint) + '" class="config-input"/>';
                }
                return '<div class="flex flex-col gap-0.5">'
                    + '<label class="text-text-muted text-[10px] uppercase tracking-wider">' + escHtml(item.label) + '</label>'
                    + control
                    + '</div>';
            }).join('');
            sections.push('<div id="config-section-' + escHtml(tab) + '" style="' + display + '" class="grid grid-cols-2 gap-x-4 gap-y-2 col-span-2">' + items + '</div>');
        }
        document.getElementById('config-body').innerHTML = sections.join('');
    } catch(e) {
        document.getElementById('config-body').innerHTML =
            '<div class="col-span-2" style="color:var(--neon-red);font-size:0.75rem">' + e.message + '</div>';
    }
}

async function saveConfig() {
    var btn = document.getElementById('btn-save-config');
    if (btn && btn.disabled) return;
    var pairs = {};
    _allConfigKeys().forEach(function(item) {
        var el = document.getElementById('cfg-' + item.key);
        if (!el) return;
        var v = el.value.trim();
        if (item.password && !v) return;
        pairs[item.key] = v;
    });
    var origText = btn ? btn.textContent : '';
    if (btn) {
        btn.disabled = true;
        btn.textContent = '保存中…';
    }
    try {
        await apiFetch('/api/binance/config', {
            method: 'POST',
            body: JSON.stringify({ pairs: pairs }),
        });
        showToast('配置已保存', true);
        loadStatus();
        loadConfig();
    } catch(e) {
        showToast('保存失败：' + e.message, false);
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.textContent = origText || '保存配置';
        }
    }
}

// ── Open positions ────────────────────────────────────────────────────────────

async function loadOpenPositions() {
    try {
        var rows = await apiFetch('/api/binance/positions?status=open&limit=50');
        document.getElementById('open-pos-count').textContent = rows.length + ' 条';

        if (!rows.length) {
            document.getElementById('open-positions-body').innerHTML =
                '<div class="text-text-muted text-xs">暂无持仓</div>';
            return;
        }

        var trs = rows.map(function(p) {
            var upnl = Number(p.unrealized_pnl_usdt);
            return '<tr>'
                + '<td style="font-weight:500;color:var(--text-primary)">' + escHtml(p.symbol || '—') + '</td>'
                + '<td>' + sideBadge(p.side) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.entry_price, 6) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.mark_price, 6) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.quantity, 6) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums;' + pnlColor(upnl) + '">' + (Number.isFinite(upnl) ? ((upnl >= 0 ? '+' : '') + upnl.toFixed(4)) : '—') + '</td>'
                + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.leverage, 0) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.liquidation_price, 6) + '</td>'
                + '<td class="text-text-muted">' + escHtml(p.margin_type || '—') + '</td>'
                + '</tr>';
        }).join('');

        document.getElementById('open-positions-body').innerHTML =
            '<table><thead><tr>'
            + '<th>标的</th><th>方向</th><th>开仓价</th><th>标记价</th><th>数量</th><th>浮盈 U</th><th>杠杆</th><th>强平价</th><th>保证金模式</th>'
            + '</tr></thead><tbody>' + trs + '</tbody></table>';
    } catch(e) {
        document.getElementById('open-positions-body').innerHTML =
            '<div style="color:var(--neon-red);font-size:0.75rem">读取当前持仓失败：' + escHtml(String(e.message || 'unknown_error')) + '</div>';
    }
}

// ── Signal log ────────────────────────────────────────────────────────────────

async function loadSignals() {
    try {
        var rows = await apiFetch('/api/binance/signals?limit=100');

        if (!rows.length) {
            document.getElementById('signals-body').innerHTML =
                '<div class="text-text-muted text-xs">暂无信号日志</div>';
            return;
        }

        var trs = rows.map(function(s) {
            return '<tr>'
                + '<td class="text-text-secondary">' + escHtml(s.source || '—') + '</td>'
                + '<td class="text-text-secondary">' + escHtml(s.action || '—') + '</td>'
                + '<td style="font-weight:500;color:var(--text-primary)">' + escHtml(s.symbol || '—') + '</td>'
                + '<td>' + sideBadge(s.side) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(s.entry_price, 4) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums;color:var(--neon-red)">' + fmtNum(s.sl_price, 4) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums;color:var(--neon-green)">' + fmtNum(s.tp_price, 4) + '</td>'
                + '<td>' + signalStatusBadge(s.status) + '</td>'
                + '<td class="text-text-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;cursor:pointer" title="' + escHtml(s.skip_reason || '') + '" onclick="var e=this.style;if(e.maxWidth){e.maxWidth=\'\';e.overflow=\'\';e.textOverflow=\'\'}else{e.maxWidth=\'160px\';e.overflow=\'hidden\';e.textOverflow=\'ellipsis\'}">' + escHtml(s.skip_reason || '—') + '</td>'
                + '<td class="text-text-muted">' + fmtTime(s.received_at) + '</td>'
                + '</tr>';
        }).join('');

        document.getElementById('signals-body').innerHTML =
            '<table><thead><tr>'
            + '<th>来源</th><th>动作</th><th>标的</th><th>方向</th><th>入场价</th><th>止损</th><th>止盈</th><th>状态</th><th>跳过原因</th><th>收到时间</th>'
            + '</tr></thead><tbody>' + trs + '</tbody></table>';
    } catch(e) {
        document.getElementById('signals-body').innerHTML =
            '<div style="color:var(--neon-red);font-size:0.75rem">' + e.message + '</div>';
    }
}

// ── Refresh all ───────────────────────────────────────────────────────────────

function refreshAll() {
    loadStatus();
    loadConfig();
    loadOpenPositions();
    loadSignals();
}

// ── Theme ─────────────────────────────────────────────────────────────────────

function toggleTheme() {
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = isDark ? '\u2600' : '\u263D';
}

(function initTheme() {
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-btn') && (document.getElementById('theme-btn').textContent = '\u2600');
    }
})();

// ── Init ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function() {
    tickHeaderClock();
    setInterval(tickHeaderClock, 30000);
    refreshAll();
    setInterval(function() {
        if (document.visibilityState === 'visible') {
            loadOpenPositions();
            loadStatus();
        }
    }, 30000);

    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
            loadOpenPositions();
            loadStatus();
        }
    });
});
</script>
