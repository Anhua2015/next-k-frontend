<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实盘看板 · Next K</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="theme.css" />
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif SC"', 'Georgia', 'serif'],
                        sans: ['"Source Sans 3"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        background: 'var(--bg)',
                        surface: 'var(--surface)',
                        'surface-light': 'var(--surface-light)',
                        border: 'var(--border)',
                        accent: 'var(--accent)',
                        'neon-green': 'var(--neon-green)',
                        'neon-red': 'var(--neon-red)',
                        'neon-purple': 'var(--neon-purple)',
                        'neon-blue': 'var(--neon-blue)',
                        'neon-yellow': 'var(--neon-yellow)',
                        warn: 'var(--warn)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                        'text-muted': 'var(--text-muted)',
                    },
                    borderRadius: {
                        sm: '0.125rem',
                        DEFAULT: '0.1875rem',
                        md: '0.1875rem',
                        lg: '0.25rem',
                        xl: '0.3125rem',
                        '2xl': '0.375rem',
                        '3xl': '0.4375rem',
                    },
                }
            }
        }
    </script>
    <style>
        .card {
            transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
            box-shadow: var(--card-shadow);
            border-radius: var(--radius-lg);
        }
        .card:hover {
            border-color: color-mix(in srgb, var(--gold) 22%, var(--border));
            box-shadow: var(--card-shadow-hover);
        }
        .btn-secondary { transition: border-color 0.15s ease, color 0.15s ease, background-color 0.15s ease; }
        .pnl-pos { color: var(--neon-green); }
        .pnl-neg { color: var(--neon-red); }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.1rem 0.45rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .badge-open    { background: color-mix(in srgb, var(--neon-green) 15%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 28%, transparent); }
        .badge-closed  { background: color-mix(in srgb, var(--text-muted) 12%, transparent); color: var(--text-secondary); border: 1px solid color-mix(in srgb, var(--text-muted) 22%, transparent); }
        .badge-long    { background: color-mix(in srgb, var(--neon-green) 12%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 25%, transparent); }
        .badge-short   { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-tp      { background: color-mix(in srgb, var(--neon-green) 12%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 25%, transparent); }
        .badge-sl      { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-expired { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }
        .badge-manual  { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); }
        .badge-unknown { background: color-mix(in srgb, var(--text-muted) 10%, transparent); color: var(--text-muted); border: 1px solid color-mix(in srgb, var(--text-muted) 20%, transparent); }
        .badge-enabled  { background: color-mix(in srgb, var(--neon-green) 15%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 28%, transparent); }
        .badge-disabled { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-testnet  { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }
        table { border-collapse: collapse; width: 100%; }
        th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 0.55rem 0.75rem; font-size: 0.78rem; border-bottom: 1px solid color-mix(in srgb, var(--border) 90%, transparent); white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--hover-bg); }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.6rem 1.1rem;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
            z-index: 999;
            animation: fadein 0.2s ease;
        }
        .toast-ok  { background: color-mix(in srgb, var(--neon-green) 15%, transparent); border: 1px solid color-mix(in srgb, var(--neon-green) 30%, transparent); color: var(--neon-green); }
        .toast-err { background: color-mix(in srgb, var(--neon-red) 15%, transparent); border: 1px solid color-mix(in srgb, var(--neon-red) 30%, transparent); color: var(--neon-red); }
        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-light);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
        .bn-lane-scroll { max-height: 28rem; overflow: auto; }
        #bn-tab-bar button { font-size: 0.6875rem; letter-spacing: 0.03em; }
        #bn-tab-bar button[aria-selected="true"] {
            color: var(--gold);
            border-color: color-mix(in srgb, var(--gold) 55%, var(--accent));
            background: linear-gradient(180deg, var(--gold-soft) 0%, color-mix(in srgb, var(--surface) 92%, transparent) 100%);
        }
        @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="app-header sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-2.5">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-4 min-w-0">
                <a href="index.html" class="flex items-center gap-2.5 shrink-0 group">
                    <div class="brand-mark" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <span class="brand-title text-text-primary group-hover:text-accent transition-colors">Next <span class="text-accent">K</span></span>
                        <div class="brand-subtitle hidden sm:block">Live Terminal</div>
                    </div>
                </a>
                <nav class="flex items-center gap-1.5" aria-label="主导航">
                    <a href="index.html" class="nav-pill">策略看板</a>
                    <a href="binance.html" class="nav-pill nav-pill-active" aria-current="page">实盘看板</a>
                </nav>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <span id="header-et-clock" class="header-clock hidden lg:inline" title="美东时间">--:-- ET</span>
                <button type="button" onclick="toggleTheme()" class="theme-toggle" title="切换主题" id="theme-btn">☽</button>
                <button type="button" onclick="refreshAll()" class="btn-ghost">刷新</button>
                <div id="status-badge" class="status-pill status-pill-err bg-neon-red/[0.08] text-neon-red border-neon-red/20">
                    <span class="status-dot"></span><span>离线</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div id="toast-container"></div>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-5">

    <!-- Status -->
    <section>
        <!-- Status card -->
        <div class="bg-surface rounded-xl border border-border card p-4">
            <div class="flex items-center justify-between mb-3">
                <div>
                    <div class="panel-kicker">System</div>
                    <h2 class="panel-title mt-1">系统状态</h2>
                </div>
                <button id="btn-sign-tradfi" type="button" onclick="signTradFiPerps()" class="hidden btn-secondary px-2.5 py-1 rounded-lg bg-surface-light/80 border border-border/90 text-text-muted text-xs hover:border-accent/40 hover:text-accent disabled:opacity-50" title="CRCL/PAYP 等股票永续需先签署">签署 TradFi</button>
            </div>
            <div id="status-body" class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                <div class="text-text-muted text-xs animate-pulse col-span-3">加载中…</div>
            </div>
        </div>
    </section>

    <!-- Binance live -->
    <section>
        <div class="bg-surface rounded-xl border border-border card overflow-hidden min-w-0">
            <div class="px-4 py-3 border-b border-border/90 bg-surface-light/[0.35] flex items-center justify-between gap-2 flex-wrap">
                <div>
                    <div class="panel-kicker">Binance Futures</div>
                    <h2 class="panel-title mt-0.5">U 本位永续</h2>
                </div>
                <span id="bn-lane-status" class="text-text-muted text-xs shrink-0">—</span>
            </div>
            <div id="bn-tab-bar" class="flex flex-nowrap items-end gap-0.5 overflow-x-auto px-3 sm:px-4 pt-2 border-b border-border/60 bg-surface-light/[0.15] scrollbar-thin" role="tablist" aria-label="币安合约数据"></div>
            <div id="usdt-account-bar" class="px-4 py-3 border-b border-border/90 bg-surface-light/[0.2]">
                <div class="text-text-muted text-xs animate-pulse">加载 U 本位账户…</div>
            </div>
            <div id="bn-tab-panels" class="min-w-0">
                <div id="bn-panel-positions" role="tabpanel" class="bn-lane-scroll overflow-x-auto p-4">
                    <div id="open-positions-body" class="text-text-muted text-xs animate-pulse">加载持仓…</div>
                </div>
                <div id="bn-panel-orders" role="tabpanel" hidden class="bn-lane-scroll overflow-x-auto p-4">
                    <div id="open-orders-body" class="text-text-muted text-xs animate-pulse">加载委托…</div>
                </div>
                <div id="bn-panel-trades" role="tabpanel" hidden class="bn-lane-scroll overflow-x-auto p-4">
                    <div id="trade-history-body" class="text-text-muted text-xs animate-pulse">加载成交…</div>
                </div>
                <div id="bn-panel-pos-history" role="tabpanel" hidden class="bn-lane-scroll overflow-x-auto p-4">
                    <div id="pos-history-body" class="text-text-muted text-xs animate-pulse">加载仓位历史…</div>
                </div>
            </div>
        </div>
    </section>

</main>

<script src="api-base.js"></script>
<script>
function getApiBase() { return resolveApiBase(); }
function buildHeaders() {
    return { 'Content-Type': 'application/json' };
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg, ok) {
    const el = document.createElement('div');
    el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// ── API fetch ─────────────────────────────────────────────────────────────────

async function apiFetch(path, opts) {
    const url = getApiBase() + path;
    const res = await fetch(url, { headers: buildHeaders(), ...(opts || {}) });
    if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(res.status + ' ' + body);
    }
    return res.json();
}

// ── Countdown ─────────────────────────────────────────────────────────────────

let _countdownTimer = null;

function startCountdowns() {
    if (_countdownTimer) clearInterval(_countdownTimer);
    _countdownTimer = setInterval(tickCountdowns, 1000);
}

function tickCountdowns() {
    document.querySelectorAll('[data-expire]').forEach(function(el) {
        const expStr = el.dataset.expire;
        if (!expStr) return;
        const diff = Math.floor((new Date(expStr) - new Date()) / 1000);
        if (diff <= 0) {
            el.textContent = '已过期';
            el.style.color = '#e07884';
            return;
        }
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        el.textContent = h + 'h ' + String(m).padStart(2, '0') + 'm ' + String(s).padStart(2, '0') + 's';
        el.style.color = diff < 600 ? '#c9a66b' : '#94a3b8';
    });
}

// ── Formatters ────────────────────────────────────────────────────────────────

function escHtml(v) {
    if (v == null) return '';
    return String(v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function fmtTime(iso) {
    if (!iso) return '—';
    try {
        return new Date(iso).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false }).replace(/\//g, '-');
    } catch(e) {
        return iso;
    }
}

function fmtNum(v, decimals) {
    if (v == null) return '—';
    return Number(v).toFixed(decimals != null ? decimals : 4);
}

function fmtUsd(v, decimals) {
    if (v == null || !Number.isFinite(Number(v))) return '—';
    return Number(v).toFixed(decimals != null ? decimals : 2) + ' U';
}

function fmtPnlHtml(v) {
    if (v == null || !Number.isFinite(Number(v))) return '—';
    var n = Number(v);
    var sign = n >= 0 ? '+' : '';
    return '<span style="' + pnlColor(n) + '">' + sign + n.toFixed(2) + ' U</span>';
}

function marginTypeLabel(v) {
    if (!v) return '—';
    var s = String(v).toUpperCase();
    if (s === 'ISOLATED') return '逐仓';
    if (s === 'CROSSED' || s === 'CROSS') return '全仓';
    return escHtml(v);
}

function positionNotional(p) {
    var qty = Number(p.quantity);
    var mark = Number(p.mark_price);
    if (!Number.isFinite(qty) || !Number.isFinite(mark)) return null;
    return qty * mark;
}

function renderAccountBar(acct, rows) {
    var bar = document.getElementById('usdt-account-bar');
    if (!bar) return;
    if (!acct) {
        bar.innerHTML = '<div class="text-text-muted text-xs">账户摘要暂不可用</div>';
        return;
    }
    var posUpnl = 0;
    var hasPosUpnl = false;
    (rows || []).forEach(function(p) {
        var u = Number(p.unrealized_pnl_usdt);
        if (Number.isFinite(u)) {
            posUpnl += u;
            hasPosUpnl = true;
        }
    });
    var items = [
        ['合约类型', '<span class="text-text-primary text-xs font-medium">USDT 永续 · U本位</span>'],
        ['钱包余额', '<span class="font-mono text-xs text-text-primary">' + fmtUsd(acct.wallet_balance_usdt) + '</span>'],
        ['可用余额', '<span class="font-mono text-xs text-text-primary">' + fmtUsd(acct.available_balance_usdt) + '</span>'],
        ['账户浮盈', fmtPnlHtml(acct.unrealized_pnl_usdt)],
        ['持仓浮盈', hasPosUpnl ? fmtPnlHtml(posUpnl) : '<span class="text-text-muted text-xs">—</span>'],
    ];
    bar.innerHTML = '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">' + items.map(function(item) {
        return '<div class="flex flex-col gap-0.5">'
            + '<span class="text-text-muted text-[10px] uppercase tracking-wider">' + item[0] + '</span>'
            + '<div>' + item[1] + '</div>'
            + '</div>';
    }).join('') + '</div>';
}

function pnlColor(v) {
    if (v == null) return '';
    return Number(v) >= 0 ? 'color:var(--neon-green)' : 'color:var(--neon-red)';
}

function sideBadge(side) {
    if (!side) return '—';
    var cls = String(side).toLowerCase() === 'long' ? 'badge-long' : 'badge-short';
    return '<span class="badge ' + cls + '">' + escHtml(side) + '</span>';
}

function reasonBadge(r) {
    if (!r) return '—';
    var labels = {
        tp: '止盈', sl: '止损', expired: '到期', manual: '手动', unknown: '未知',
        paper_close: '纸面平仓', external: '外部平仓',
        momentum_scan: '动量调仓', momentum_trail: '动量移动止盈',
        jiezhen_scan: '接针调仓', jiezhen_trail: '接针移动止盈',
    };
    // 解析 "momentum_scan/trail_tier1" 格式
    var parts = String(r).split('/');
    var sourcePart = parts[0] || '';
    var rulePart = parts[1] || '';
    var ruleLabels = {
        trail_tier1: '止盈一档', trail_tier2: '止盈二档',
        trail_low: '低档保护', trail_stop: '硬止损',
        rotate: '换仓', expired: '到期',
    };
    // class 白名单：只允许已知 key 进入 class 属性
    var BADGE_CLASS_WHITELIST = {
        tp: 1, sl: 1, expired: 1, manual: 1, unknown: 1,
        paper_close: 1, external: 1,
        momentum_scan: 1, momentum_trail: 1,
        jiezhen_scan: 1, jiezhen_trail: 1,
        trail_tier1: 1, trail_tier2: 1,
        trail_low: 1, trail_stop: 1,
        rotate: 1,
    };
    var sourceLabel = labels[sourcePart] || sourcePart;
    var ruleLabel = ruleLabels[rulePart] || rulePart;
    var display = ruleLabel ? sourceLabel + '/' + ruleLabel : sourceLabel;
    var rawClassKey = rulePart || sourcePart;
    var classKey = BADGE_CLASS_WHITELIST[rawClassKey] ? rawClassKey : 'unknown';
    return '<span class="badge badge-' + classKey + '">' + escHtml(display) + '</span>';
}

function signalStatusBadge(status, action) {
    if (!status) return '—';
    var act = (action || 'open').toLowerCase();
    if (status === 'traded' && act === 'close') {
        return '<span class="badge badge-unknown">已平仓</span>';
    }
    var cls = status === 'traded' ? 'badge-open' : status === 'error' ? 'badge-sl' : 'badge-unknown';
    var labels = { traded: '已开仓', received: '已收到', error: '错误' };
    return '<span class="badge ' + cls + '">' + escHtml(labels[status] || status) + '</span>';
}

function skipReasonLabel(reason) {
    if (!reason) return '—';
    if (reason === 'already_flat') return '交易所已平仓';
    return reason;
}

// ── Status ────────────────────────────────────────────────────────────────────

function setBinanceStatusPill(el, state, text) {
    var classes = {
        ok: 'status-pill status-pill-ok bg-neon-green/[0.08] text-neon-green border-neon-green/20',
        warn: 'status-pill status-pill-warn bg-neon-yellow/[0.08] text-neon-yellow border-neon-yellow/22',
        err: 'status-pill status-pill-err bg-neon-red/[0.08] text-neon-red border-neon-red/20',
    };
    el.className = classes[state] || classes.err;
    el.innerHTML = '<span class="status-dot"></span><span>' + text + '</span>';
}

function tickHeaderClock() {
    var el = document.getElementById('header-et-clock');
    if (!el) return;
    try {
        var parts = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/New_York',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
        }).formatToParts(new Date());
        var h = (parts.find(function(p) { return p.type === 'hour'; }) || {}).value || '--';
        var m = (parts.find(function(p) { return p.type === 'minute'; }) || {}).value || '--';
        el.textContent = h + ':' + m + ' ET';
    } catch (e) {
        el.textContent = '--:-- ET';
    }
}

async function loadStatus() {
    try {
        var d = await apiFetch('/api/binance/status');
        var liveOn = d.live_active === true;
        var running = d.vnpy && d.vnpy.running === true;

        var badge = document.getElementById('status-badge');
        if (badge) {
            if (!d.api_key_set) {
                setBinanceStatusPill(badge, 'warn', '未配置 Key');
            } else if (liveOn && running) {
                setBinanceStatusPill(badge, 'ok', '实盘');
            } else if (running) {
                setBinanceStatusPill(badge, 'warn', 'VnPy');
            } else {
                setBinanceStatusPill(badge, 'err', '离线');
            }
        }

        var items = [
            ['Lane', '<span class="text-text-secondary text-xs font-mono">' + escHtml(d.lane || '—') + '</span>'],
            ['Live', liveOn ? '<span class="badge badge-enabled">已启用</span>' : '<span class="badge badge-disabled">未启用</span>'],
            ['VnPy', running ? '<span class="badge badge-enabled">运行中</span>' : '<span class="badge badge-disabled">未运行</span>'],
            ['当前仓位', '<span style="font-variant-numeric:tabular-nums" class="text-text-primary font-mono">' + (d.open_positions != null ? d.open_positions : '—') + '</span>'],
        ];

        document.getElementById('status-body').innerHTML = items.map(function(item) {
            return '<div class="flex flex-col gap-0.5">'
                + '<span class="text-text-muted text-[10px] uppercase tracking-wider">' + item[0] + '</span>'
                + '<div class="text-xs">' + item[1] + '</div>'
                + '</div>';
        }).join('');
    } catch(e) {
        document.getElementById('status-body').innerHTML =
            '<div class="col-span-3" style="color:var(--neon-red);font-size:0.75rem">无法连接：' + e.message + '</div>';
        var badge = document.getElementById('status-badge');
        if (badge) setBinanceStatusPill(badge, 'err', '离线');
    }
}

async function signTradFiPerps() {
    var btn = document.getElementById('btn-sign-tradfi');
    if (btn && btn.disabled) return;
    var orig = btn ? btn.textContent : '';
    if (btn) {
        btn.disabled = true;
        btn.textContent = '签署中…';
    }
    try {
        var d = await apiFetch('/api/binance/_internal/sign-tradfi-perps');
        showToast('TradFi 协议已签署' + (d.result ? '：' + d.result : ''), true);
    } catch (e) {
        showToast('签署失败：' + e.message, false);
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.textContent = orig || '签署 TradFi';
        }
    }
}

// ── Binance tabs ──────────────────────────────────────────────────────────────

var BN_TAB_META = [
    ['positions', '仓位'],
    ['orders', '当前委托'],
    ['trades', '历史成交'],
    ['pos_history', '仓位历史记录'],
];
var _bnCounts = { positions: 0, orders: 0, trades: 0, pos_history: 0 };

function bnTabBtnClass(active) {
    var base = 'shrink-0 px-2.5 sm:px-3 py-1.5 text-[11px] font-semibold tracking-wide rounded-t-md border-b-2 transition-all duration-200';
    return active
        ? base + ' border-[color-mix(in_srgb,var(--gold)_55%,var(--accent))] text-text-primary'
        : base + ' border-transparent text-text-muted hover:text-text-secondary';
}

function bnPreferredTabKey() {
    try {
        var k = localStorage.getItem('bnLaneTabKey');
        if (k && BN_TAB_META.some(function(pair) { return pair[0] === k; })) return k;
    } catch (e) { /* ignore */ }
    return 'positions';
}

function renderBnTabBar() {
    var bar = document.getElementById('bn-tab-bar');
    if (!bar) return;
    var active = bnPreferredTabKey();
    bar.innerHTML = BN_TAB_META.map(function(pair) {
        var key = pair[0];
        var label = pair[1];
        var count = _bnCounts[key];
        var suffix = count != null && Number.isFinite(count) ? ' (' + count + ')' : '';
        var on = key === active;
        return '<button type="button" role="tab" id="bn-tab-' + key + '" data-bn-tab-key="' + key + '"'
            + ' class="' + bnTabBtnClass(on) + '"'
            + ' aria-selected="' + (on ? 'true' : 'false') + '" aria-controls="bn-panel-' + key + '" tabindex="' + (on ? '0' : '-1') + '">'
            + escHtml(label + suffix) + '</button>';
    }).join('');
}

function switchBnTab(key) {
    if (!BN_TAB_META.some(function(pair) { return pair[0] === key; })) return;
    BN_TAB_META.forEach(function(pair) {
        var id = pair[0];
        var tab = document.getElementById('bn-tab-' + id);
        var panel = document.getElementById('bn-panel-' + id);
        var on = id === key;
        if (tab) {
            tab.setAttribute('aria-selected', on ? 'true' : 'false');
            tab.tabIndex = on ? 0 : -1;
            tab.className = bnTabBtnClass(on);
        }
        if (panel) {
            if (on) panel.removeAttribute('hidden');
            else panel.setAttribute('hidden', '');
        }
    });
    var acctBar = document.getElementById('usdt-account-bar');
    if (acctBar) {
        if (key === 'positions') acctBar.classList.remove('hidden');
        else acctBar.classList.add('hidden');
    }
    try { localStorage.setItem('bnLaneTabKey', key); } catch (e) { /* ignore */ }
}

function initBnTabDelegationOnce() {
    var bar = document.getElementById('bn-tab-bar');
    if (!bar || bar.dataset.bnTabDeleg === '1') return;
    bar.dataset.bnTabDeleg = '1';
    bar.addEventListener('click', function(ev) {
        var btn = ev.target && ev.target.closest && ev.target.closest('button[data-bn-tab-key]');
        if (!btn) return;
        var k = btn.getAttribute('data-bn-tab-key');
        if (k) switchBnTab(k);
    });
}

function updateBnLaneStatus() {
    var el = document.getElementById('bn-lane-status');
    if (!el) return;
    var parts = [];
    if (_bnCounts.positions != null) parts.push('仓位 ' + _bnCounts.positions);
    if (_bnCounts.orders != null) parts.push('委托 ' + _bnCounts.orders);
    el.textContent = parts.length ? parts.join(' · ') : '—';
}

function orderSideBadge(side) {
    if (!side) return '—';
    var s = String(side).toUpperCase();
    var cls = s === 'BUY' ? 'badge-long' : 'badge-short';
    var label = s === 'BUY' ? '买入' : s === 'SELL' ? '卖出' : s;
    return '<span class="badge ' + cls + '">' + escHtml(label) + '</span>';
}

function renderOpenPositions(rows) {
    var body = document.getElementById('open-positions-body');
    if (!body) return;
    _bnCounts.positions = (rows || []).length;
    if (!rows.length) {
        body.innerHTML = '<div class="text-text-muted text-xs">暂无 U 本位持仓</div>';
        return;
    }
    var trs = rows.map(function(p) {
        var upnl = Number(p.unrealized_pnl_usdt);
        var notional = positionNotional(p);
        return '<tr>'
            + '<td style="font-weight:500;color:var(--text-primary)">' + escHtml(p.symbol || '—') + '</td>'
            + '<td>' + sideBadge(p.side) + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.entry_price, 4) + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.mark_price, 4) + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.quantity, 4) + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + (notional != null ? fmtUsd(notional, 2) : '—') + '</td>'
            + '<td style="font-variant-numeric:tabular-nums;' + pnlColor(upnl) + '">' + (Number.isFinite(upnl) ? ((upnl >= 0 ? '+' : '') + upnl.toFixed(2) + ' U') : '—') + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + (p.leverage != null ? escHtml(String(p.leverage)) + 'x' : '—') + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(p.liquidation_price, 4) + '</td>'
            + '<td class="text-text-muted text-xs">' + marginTypeLabel(p.margin_type) + '</td>'
            + '</tr>';
    }).join('');
    body.innerHTML = '<table><thead><tr>'
        + '<th>标的</th><th>方向</th><th>开仓价</th><th>标记价</th><th>数量</th><th>名义(U)</th><th>浮盈(U)</th><th>杠杆</th><th>强平价</th><th>保证金</th>'
        + '</tr></thead><tbody>' + trs + '</tbody></table>';
}

function renderOpenOrders(rows) {
    var body = document.getElementById('open-orders-body');
    if (!body) return;
    _bnCounts.orders = (rows || []).length;
    if (!rows.length) {
        body.innerHTML = '<div class="text-text-muted text-xs">暂无当前委托</div>';
        return;
    }
    var trs = rows.map(function(o) {
        var kind = o.kind === 'algo' ? '条件' : '限价';
        return '<tr>'
            + '<td class="font-mono text-text-muted text-[11px]">' + escHtml(String(o.order_id || '—')) + '</td>'
            + '<td class="text-text-secondary text-xs">' + fmtTimeMs(o.time_ms) + '</td>'
            + '<td style="font-weight:500;color:var(--text-primary)">' + escHtml(o.symbol || '—') + '</td>'
            + '<td>' + orderSideBadge(o.side) + '</td>'
            + '<td class="text-text-muted text-xs">' + escHtml(o.order_type || '—') + ' (' + escHtml(kind) + ')</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(o.price, 4) + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(o.qty, 4) + '</td>'
            + '<td style="font-variant-numeric:tabular-nums;color:var(--text-muted)">' + fmtNum(o.filled_qty, 4) + '</td>'
            + '<td class="text-text-secondary text-xs">' + escHtml(o.status_label || o.status || '—') + '</td>'
            + '<td class="text-text-muted text-xs">' + (o.reduce_only ? '是' : '—') + '</td>'
            + '</tr>';
    }).join('');
    body.innerHTML = '<table><thead><tr>'
        + '<th>订单号</th><th>时间</th><th>合约</th><th>方向</th><th>类型</th><th>价格</th><th>数量</th><th>已成交</th><th>状态</th><th>只减仓</th>'
        + '</tr></thead><tbody>' + trs + '</tbody></table>';
}

function renderTradeHistory(rows, days) {
    var body = document.getElementById('trade-history-body');
    if (!body) return;
    _bnCounts.trades = (rows || []).length;
    if (!rows.length) {
        body.innerHTML = '<div class="text-text-muted text-xs">近 ' + escHtml(String(days || 7)) + ' 天暂无成交记录</div>';
        return;
    }
    var trs = rows.map(function(t) {
        var asset = baseAsset(t.symbol);
        return '<tr>'
            + '<td class="font-mono text-text-muted text-[11px]">' + escHtml(String(t.order_id || t.id || '—')) + '</td>'
            + '<td class="text-text-secondary text-xs">' + fmtTimeMs(t.time_ms) + '</td>'
            + '<td style="font-weight:500;color:var(--text-primary)">' + escHtml(t.symbol || '—') + ' <span class="text-text-muted text-[10px]">永续</span></td>'
            + '<td>' + tradeSideLabelBadge(t.side_label) + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(t.price, 4) + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(t.qty, 4) + (asset ? ' ' + escHtml(asset) : '') + '</td>'
            + '<td style="font-variant-numeric:tabular-nums;color:var(--text-muted)">' + fmtNum(t.commission_usdt, 4) + ' USDT</td>'
            + '<td class="text-text-muted text-xs">' + escHtml(t.role || '—') + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtPnlHtml(t.realized_pnl_usdt) + '</td>'
            + '</tr>';
    }).join('');
    body.innerHTML = '<table><thead><tr>'
        + '<th>订单号</th><th>时间</th><th>合约</th><th>方向</th><th>成交均价</th><th>数量</th><th>手续费</th><th>角色</th><th>已实现盈亏</th>'
        + '</tr></thead><tbody>' + trs + '</tbody></table>';
}

function renderPositionHistory(rows, days) {
    var body = document.getElementById('pos-history-body');
    if (!body) return;
    _bnCounts.pos_history = (rows || []).length;
    if (!rows.length) {
        body.innerHTML = '<div class="text-text-muted text-xs">近 ' + escHtml(String(days || 7)) + ' 天暂无已实现盈亏记录</div>';
        return;
    }
    var trs = rows.map(function(r) {
        return '<tr>'
            + '<td class="text-text-secondary text-xs">' + fmtTimeMs(r.time_ms) + '</td>'
            + '<td style="font-weight:500;color:var(--text-primary)">' + escHtml(r.symbol || '—') + '</td>'
            + '<td style="font-variant-numeric:tabular-nums">' + fmtPnlHtml(r.pnl_usdt) + '</td>'
            + '<td class="font-mono text-text-muted text-[11px]">' + escHtml(r.trade_id || '—') + '</td>'
            + '<td class="text-text-muted text-xs max-w-[12rem] truncate" title="' + escHtml(r.info || '') + '">' + escHtml(r.info || '—') + '</td>'
            + '</tr>';
    }).join('');
    body.innerHTML = '<p class="text-text-muted text-[10px] mb-2">近 ' + escHtml(String(days || 7)) + ' 天 · 来源币安 REALIZED_PNL 流水</p>'
        + '<table><thead><tr>'
        + '<th>时间</th><th>合约</th><th>已实现盈亏</th><th>成交ID</th><th>备注</th>'
        + '</tr></thead><tbody>' + trs + '</tbody></table>';
}

async function loadBinanceLane() {
    try {
        var results = await Promise.allSettled([
            apiFetch('/api/binance/positions?status=open&limit=50'),
            apiFetch('/api/binance/account/summary'),
            apiFetch('/api/binance/orders/open?limit=200'),
            apiFetch('/api/binance/trades?days=7&limit=200'),
            apiFetch('/api/binance/position-history?days=7&limit=200'),
        ]);
        if (results[0].status === 'fulfilled') {
            var rows = results[0].value || [];
            var acct = results[1].status === 'fulfilled' ? results[1].value : null;
            renderAccountBar(acct, rows);
            renderOpenPositions(rows);
        } else {
            renderAccountBar(null, []);
            document.getElementById('open-positions-body').innerHTML =
                '<div style="color:var(--neon-red);font-size:0.75rem">' + escHtml(String(results[0].reason && results[0].reason.message || '加载持仓失败')) + '</div>';
            _bnCounts.positions = 0;
        }
        if (results[2].status === 'fulfilled') {
            renderOpenOrders((results[2].value.orders) || []);
        } else {
            document.getElementById('open-orders-body').innerHTML =
                '<div style="color:var(--neon-red);font-size:0.75rem">' + escHtml(String(results[2].reason && results[2].reason.message || '加载委托失败')) + '</div>';
            _bnCounts.orders = 0;
        }
        if (results[3].status === 'fulfilled') {
            var trPayload = results[3].value || {};
            renderTradeHistory(trPayload.trades || [], trPayload.days || 7);
        } else {
            document.getElementById('trade-history-body').innerHTML =
                '<div style="color:var(--neon-red);font-size:0.75rem">' + escHtml(String(results[3].reason && results[3].reason.message || '加载成交失败')) + '</div>';
            _bnCounts.trades = 0;
        }
        if (results[4].status === 'fulfilled') {
            var histPayload = results[4].value || {};
            renderPositionHistory(histPayload.records || [], histPayload.days || 7);
        } else {
            document.getElementById('pos-history-body').innerHTML =
                '<div style="color:var(--neon-red);font-size:0.75rem">' + escHtml(String(results[4].reason && results[4].reason.message || '加载仓位历史失败')) + '</div>';
            _bnCounts.pos_history = 0;
        }
        renderBnTabBar();
        switchBnTab(bnPreferredTabKey());
        updateBnLaneStatus();
    } catch (e) {
        console.error(e);
    }
}

function tradeSideLabelBadge(label) {
    if (!label) return '—';
    var t = String(label);
    var isClose = t.indexOf('平') === 0;
    var cls = isClose ? 'badge-short' : 'badge-long';
    return '<span class="badge ' + cls + '">' + escHtml(t) + '</span>';
}

function baseAsset(sym) {
    if (!sym || typeof sym !== 'string') return '';
    return sym.endsWith('USDT') ? sym.slice(0, -4) : sym;
}

function fmtTimeMs(ms) {
    if (!ms) return '—';
    try {
        return new Date(Number(ms)).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false }).replace(/\//g, '-');
    } catch (e) {
        return String(ms);
    }
}

// ── Signal log ────────────────────────────────────────────────────────────────

function sourceLabel(src) {
    var s = String(src || '').toLowerCase();
    if (s === 'kk') return 'King Keltner';
    if (s === 'orb') return 'ORB';
    return src || '—';
}

async function loadSignals() {
    try {
        var rows = await apiFetch('/api/binance/signals?limit=100');

        if (!rows.length) {
            document.getElementById('signals-body').innerHTML =
                '<div class="text-text-muted text-xs">近24小时暂无信号日志</div>';
            return;
        }

        var trs = rows.map(function(s) {
            return '<tr>'
                + '<td class="text-text-secondary">' + escHtml(sourceLabel(s.source)) + '</td>'
                + '<td class="text-text-secondary">' + escHtml(s.action || '—') + '</td>'
                + '<td style="font-weight:500;color:var(--text-primary)">' + escHtml(s.symbol || '—') + '</td>'
                + '<td>' + sideBadge(s.side) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums">' + fmtNum(s.entry_price, 4) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums;color:var(--neon-red)">' + fmtNum(s.sl_price, 4) + '</td>'
                + '<td style="font-variant-numeric:tabular-nums;color:var(--neon-green)">' + fmtNum(s.tp_price, 4) + '</td>'
                + '<td>' + signalStatusBadge(s.status, s.action) + '</td>'
                + '<td class="text-text-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;cursor:pointer" title="' + escHtml(skipReasonLabel(s.skip_reason) || '') + '" onclick="var e=this.style;if(e.maxWidth){e.maxWidth=\'\';e.overflow=\'\';e.textOverflow=\'\'}else{e.maxWidth=\'160px\';e.overflow=\'hidden\';e.textOverflow=\'ellipsis\'}">' + escHtml(skipReasonLabel(s.skip_reason)) + '</td>'
                + '<td class="text-text-muted">' + fmtTime(s.received_at) + '</td>'
                + '</tr>';
        }).join('');

        document.getElementById('signals-body').innerHTML =
            '<table><thead><tr>'
            + '<th>来源</th><th>动作</th><th>标的</th><th>方向</th><th>入场价</th><th>止损</th><th>止盈</th><th>状态</th><th>跳过原因</th><th>收到时间</th>'
            + '</tr></thead><tbody>' + trs + '</tbody></table>';
    } catch(e) {
        document.getElementById('signals-body').innerHTML =
            '<div style="color:var(--neon-red);font-size:0.75rem">' + e.message + '</div>';
    }
}

// ── Refresh all ───────────────────────────────────────────────────────────────

function refreshAll() {
    loadStatus();
    loadBinanceLane();
}

// ── Theme ─────────────────────────────────────────────────────────────────────

function toggleTheme() {
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = isDark ? '\u2600' : '\u263D';
}

(function initTheme() {
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-btn') && (document.getElementById('theme-btn').textContent = '\u2600');
    }
})();

// ── Init ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function() {
    tickHeaderClock();
    setInterval(tickHeaderClock, 30000);
    renderBnTabBar();
    initBnTabDelegationOnce();
    switchBnTab(bnPreferredTabKey());
    refreshAll();
    setInterval(function() {
        if (document.visibilityState === 'visible') {
            loadBinanceLane();
            loadStatus();
        }
    }, 30000);

    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
            loadBinanceLane();
            loadStatus();
        }
    });
});
</script>
