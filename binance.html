<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实盘看板 · Next K</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="theme.css" />
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif SC"', 'Georgia', 'serif'],
                        sans: ['"Source Sans 3"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        background: 'var(--bg)',
                        surface: 'var(--surface)',
                        'surface-light': 'var(--surface-light)',
                        border: 'var(--border)',
                        accent: 'var(--accent)',
                        'neon-green': 'var(--neon-green)',
                        'neon-red': 'var(--neon-red)',
                        'neon-purple': 'var(--neon-purple)',
                        'neon-blue': 'var(--neon-blue)',
                        'neon-yellow': 'var(--neon-yellow)',
                        warn: 'var(--warn)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                        'text-muted': 'var(--text-muted)',
                    },
                    borderRadius: {
                        sm: '0.125rem',
                        DEFAULT: '0.1875rem',
                        md: '0.1875rem',
                        lg: '0.25rem',
                        xl: '0.3125rem',
                        '2xl': '0.375rem',
                        '3xl': '0.4375rem',
                    },
                }
            }
        }
    </script>
    <style>
        .card {
            transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
            box-shadow: var(--card-shadow);
            border-radius: var(--radius-lg);
        }
        .card:hover {
            border-color: color-mix(in srgb, var(--gold) 22%, var(--border));
            box-shadow: var(--card-shadow-hover);
        }
        .btn-secondary { transition: border-color 0.15s ease, color 0.15s ease, background-color 0.15s ease; }
        .pnl-pos { color: var(--neon-green); }
        .pnl-neg { color: var(--neon-red); }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.1rem 0.45rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .badge-open    { background: color-mix(in srgb, var(--neon-green) 15%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 28%, transparent); }
        .badge-closed  { background: color-mix(in srgb, var(--text-muted) 12%, transparent); color: var(--text-secondary); border: 1px solid color-mix(in srgb, var(--text-muted) 22%, transparent); }
        .badge-long    { background: color-mix(in srgb, var(--neon-green) 12%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 25%, transparent); }
        .badge-short   { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-tp      { background: color-mix(in srgb, var(--neon-green) 12%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 25%, transparent); }
        .badge-sl      { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-expired { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }
        .badge-manual  { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); }
        .badge-unknown { background: color-mix(in srgb, var(--text-muted) 10%, transparent); color: var(--text-muted); border: 1px solid color-mix(in srgb, var(--text-muted) 20%, transparent); }
        .badge-enabled  { background: color-mix(in srgb, var(--neon-green) 15%, transparent); color: var(--neon-green); border: 1px solid color-mix(in srgb, var(--neon-green) 28%, transparent); }
        .badge-disabled { background: color-mix(in srgb, var(--neon-red) 12%, transparent); color: var(--neon-red); border: 1px solid color-mix(in srgb, var(--neon-red) 25%, transparent); }
        .badge-testnet  { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }
        table { border-collapse: collapse; width: 100%; }
        th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 0.55rem 0.75rem; font-size: 0.78rem; border-bottom: 1px solid color-mix(in srgb, var(--border) 90%, transparent); white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--hover-bg); }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.6rem 1.1rem;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 500;
            z-index: 999;
            animation: fadein 0.2s ease;
        }
        .toast-ok  { background: color-mix(in srgb, var(--neon-green) 15%, transparent); border: 1px solid color-mix(in srgb, var(--neon-green) 30%, transparent); color: var(--neon-green); }
        .toast-err { background: color-mix(in srgb, var(--neon-red) 15%, transparent); border: 1px solid color-mix(in srgb, var(--neon-red) 30%, transparent); color: var(--neon-red); }
        .pnl-dot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
            gap: 0.55rem;
        }
        .pnl-dot-cell {
            min-height: 72px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: color-mix(in srgb, var(--surface-light) 42%, transparent);
            padding: 0.55rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 0.35rem;
        }
        .pnl-dot-cell.pnl-profit {
            border-color: color-mix(in srgb, var(--neon-green) 35%, var(--border));
            background: color-mix(in srgb, var(--neon-green) 10%, var(--surface));
        }
        .pnl-dot-cell.pnl-loss {
            border-color: color-mix(in srgb, var(--neon-red) 35%, var(--border));
            background: color-mix(in srgb, var(--neon-red) 10%, var(--surface));
        }
        .pnl-dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--text-muted);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--text-muted) 13%, transparent);
        }
        .pnl-dot.pnl-profit { background: var(--neon-green); box-shadow: 0 0 0 3px color-mix(in srgb, var(--neon-green) 14%, transparent); }
        .pnl-dot.pnl-loss { background: var(--neon-red); box-shadow: 0 0 0 3px color-mix(in srgb, var(--neon-red) 14%, transparent); }
        .pnl-tab-active {
            border-color: color-mix(in srgb, var(--accent) 45%, var(--border)) !important;
            color: var(--accent) !important;
            background: color-mix(in srgb, var(--accent) 8%, var(--surface-light)) !important;
        }
        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-light);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
        @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<script src="binance-api-base.js"></script>
<script>
function getApiBase() { return resolveProtocolApiBase(); }
function buildHeaders() {
    // 普通 GET 不要求鉴权，但隐藏的 TradFi 签署操作会复用同一请求封装并携带令牌。
    var headers = { 'Content-Type': 'application/json' };
    try {
        var token = sessionStorage.getItem('PROTOCOL_MAINTENANCE_TOKEN');
        if (token) headers['X-Maintenance-Token'] = token;
    } catch (e) { /* ignore */ }
    return headers;
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg, ok) {
    const el = document.createElement('div');
    el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// ── API fetch ─────────────────────────────────────────────────────────────────

async function apiFetch(path, opts) {
    // 统一把非 2xx 响应转换成异常，使各卡片只处理成功数据和用户提示。
    const url = getApiBase() + path;
    const res = await fetch(url, { headers: buildHeaders(), ...(opts || {}) });
    if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(res.status + ' ' + body);
    }
    return res.json();
}

// ── Countdown ─────────────────────────────────────────────────────────────────

let _countdownTimer = null;

function startCountdowns() {
    if (_countdownTimer) clearInterval(_countdownTimer);
    _countdownTimer = setInterval(tickCountdowns, 1000);
}

function tickCountdowns() {
    document.querySelectorAll('[data-expire]').forEach(function(el) {
        const expStr = el.dataset.expire;
        if (!expStr) return;
        const diff = Math.floor((new Date(expStr) - new Date()) / 1000);
        if (diff <= 0) {
            el.textContent = '已过期';
            el.style.color = '#e07884';
            return;
        }
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        el.textContent = h + 'h ' + String(m).padStart(2, '0') + 'm ' + String(s).padStart(2, '0') + 's';
        el.style.color = diff < 600 ? '#c9a66b' : '#94a3b8';
    });
}

// ── Formatters ────────────────────────────────────────────────────────────────

function escHtml(v) {
    if (v == null) return '';
    return String(v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function fmtTime(iso) {
    if (!iso) return '—';
    try {
        return new Date(iso).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false }).replace(/\//g, '-');
    } catch(e) {
        return iso;
    }
}

function fmtNum(v, decimals) {
    if (v == null) return '—';
    return Number(v).toFixed(decimals != null ? decimals : 4);
}

function fmtUsd(v, decimals) {
    if (v == null || !Number.isFinite(Number(v))) return '—';
    return Number(v).toFixed(decimals != null ? decimals : 2) + ' U';
}

function fmtPnlHtml(v) {
    if (v == null || !Number.isFinite(Number(v))) return '—';
    var n = Number(v);
    var sign = n >= 0 ? '+' : '';
    return '<span style="' + pnlColor(n) + '">' + sign + n.toFixed(2) + ' U</span>';
}

function fmtSignedUsd(v, decimals) {
    if (v == null || !Number.isFinite(Number(v))) return '—';
    var n = Number(v);
    return (n >= 0 ? '+' : '') + n.toFixed(decimals != null ? decimals : 2) + ' U';
}

function marginTypeLabel(v) {
    if (!v) return '—';
    var s = String(v).toUpperCase();
    if (s === 'ISOLATED') return '逐仓';
    if (s === 'CROSSED' || s === 'CROSS') return '全仓';
    return escHtml(v);
}

function positionNotional(p) {
    var qty = Number(p.quantity);
    var mark = Number(p.mark_price);
    if (!Number.isFinite(qty) || !Number.isFinite(mark)) return null;
    return qty * mark;
}

function renderAccountBar(acct, rows) {
    var bar = document.getElementById('usdt-account-bar');
    if (!bar) return;
    if (!acct) {
        bar.innerHTML = '<div class="text-text-muted text-xs">账户摘要暂不可用</div>';
        return;
    }
    var posUpnl = 0;
    var hasPosUpnl = false;
    (rows || []).forEach(function(p) {
        var u = Number(p.unrealized_pnl_usdt);
        if (Number.isFinite(u)) {
            posUpnl += u;
            hasPosUpnl = true;
        }
    });
    var items = [
        ['合约类型', '<span class="text-text-primary text-xs font-medium">USDT 永续 · U本位</span>'],
        ['钱包余额', '<span class="font-mono text-xs text-text-primary">' + fmtUsd(acct.wallet_balance_usdt) + '</span>'],
        ['可用余额', '<span class="font-mono text-xs text-text-primary">' + fmtUsd(acct.available_balance_usdt) + '</span>'],
        ['账户浮盈', fmtPnlHtml(acct.unrealized_pnl_usdt)],
        ['持仓浮盈', hasPosUpnl ? fmtPnlHtml(posUpnl) : '<span class="text-text-muted text-xs">—</span>'],
    ];
    bar.innerHTML = '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">' + items.map(function(item) {
        return '<div class="flex flex-col gap-0.5">'
            + '<span class="text-text-muted text-[10px] uppercase tracking-wider">' + item[0] + '</span>'
            + '<div>' + item[1] + '</div>'
            + '</div>';
    }).join('') + '</div>';
}

function pnlColor(v) {
    if (v == null) return '';
    var n = Number(v);
    if (!Number.isFinite(n) || n === 0) return 'color:var(--text-muted)';
    return n > 0 ? 'color:var(--neon-green)' : 'color:var(--neon-red)';
}

function pnlClass(v) {
    var n = Number(v || 0);
    if (n > 0) return 'pnl-profit';
    if (n < 0) return 'pnl-loss';
    return '';
}

function sideBadge(side) {
    if (!side) return '—';
    var cls = String(side).toLowerCase() === 'long' ? 'badge-long' : 'badge-short';
    return '<span class="badge ' + cls + '">' + escHtml(side) + '</span>';
}

function signalStatusBadge(status, action) {
    if (!status) return '—';
    var act = (action || 'open').toLowerCase();
    if (status === 'traded' && act === 'close') {
        return '<span class="badge badge-unknown">已平仓</span>';
    }
    var cls = status === 'traded' ? 'badge-open' : status === 'error' ? 'badge-sl' : 'badge-unknown';
    var labels = { traded: '已开仓', received: '已收到', error: '错误' };
    return '<span class="badge ' + cls + '">' + escHtml(labels[status] || status) + '</span>';
}

function skipReasonLabel(reason) {
    if (!reason) return '—';
    if (reason === 'already_flat') return '交易所已平仓';
    return reason;
}

// ── Status ────────────────────────────────────────────────────────────────────

function setBinanceStatusPill(el, state, text) {
    var classes = {
        ok: 'status-pill status-pill-ok bg-neon-green/[0.08] text-neon-green border-neon-green/20',
        warn: 'status-pill status-pill-warn bg-neon-yellow/[0.08] text-neon-yellow border-neon-yellow/22',
        err: 'status-pill status-pill-err bg-neon-red/[0.08] text-neon-red border-neon-red/20',
    };
    el.className = classes[state] || classes.err;
    el.innerHTML = '<span class="status-dot"></span><span>' + text + '</span>';
}

function tickHeaderClock() {
    var el = document.getElementById('header-et-clock');
    if (!el) return;
    try {
        var parts = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/New_York',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
        }).formatToParts(new Date());
        var h = (parts.find(function(p) { return p.type === 'hour'; }) || {}).value || '--';
        var m = (parts.find(function(p) { return p.type === 'minute'; }) || {}).value || '--';
        el.textContent = h + ':' + m + ' ET';
    } catch (e) {
        el.textContent = '--:-- ET';
    }
}

async function loadStatus() {
    try {
        var d = await apiFetch('/api/binance/status');
        var testnet = d.testnet === true || d.testnet === 'true';
        var paused  = d.execution_paused === true;

        var badge = document.getElementById('status-badge');
        if (badge) {
            if (paused) {
                setBinanceStatusPill(badge, 'err', '已暂停');
            } else if (testnet) {
                setBinanceStatusPill(badge, 'warn', 'TESTNET');
            } else {
                setBinanceStatusPill(badge, 'ok', '实盘');
            }
        }

        var items = [
            ['网络',     testnet ? '<span class="badge badge-testnet">Testnet</span>' : '<span class="text-text-secondary text-xs">主网</span>'],
            ['执行',     paused  ? '<span class="badge badge-disabled">已暂停</span>' : '<span class="badge badge-enabled">正常</span>'],
            ['当前持仓', '<span style="font-variant-numeric:tabular-nums" class="text-text-primary font-mono">' + (d.open_positions != null ? d.open_positions : '—') + '</span>'],
        ];

        document.getElementById('status-body').innerHTML = items.map(function(item) {
            return '<div class="flex flex-col gap-0.5">'
                + '<span class="text-text-muted text-[10px] uppercase tracking-wider">' + item[0] + '</span>'
                + '<div class="text-xs">' + item[1] + '</div>'
                + '</div>';
        }).join('');
    } catch(e) {
        document.getElementById('status-body').innerHTML =
            '<div class="col-span-3" style="color:var(--neon-red);font-size:0.75rem">无法连接：' + e.message + '</div>';
        var badge = document.getElementById('status-badge');
        if (badge) setBinanceStatusPill(badge, 'err', '离线');
    }
}

async function signTradFiPerps() {
    var btn = document.getElementById('btn-sign-tradfi');
    if (btn && btn.disabled) return;
    try {
        if (!sessionStorage.getItem('PROTOCOL_MAINTENANCE_TOKEN')) {
            var token = window.prompt('Protocol 维护令牌（未配置可留空）');
            if (token) {
                sessionStorage.setItem('PROTOCOL_MAINTENANCE_TOKEN', token.trim());
            }
        }
    } catch (e) { /* ignore */ }
    var orig = btn ? btn.textContent : '';
    if (btn) {
        btn.disabled = true;
        btn.textContent = '签署中…';
    }
    try {
        var d = await apiFetch('/api/binance/_internal/sign-tradfi-perps');
        showToast('TradFi 协议已签署' + (d.result ? '：' + d.result : ''), true);
    } catch (e) {
        showToast('签署失败：' + e.message, false);
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.textContent = orig || '签署 TradFi';
        }
    }
}

// ── PnL calendar ─────────────────────────────────────────────────────────────

var _pnlPeriod = 'daily';
var _pnlStartDate = '';

try {
    _pnlStartDate = localStorage.getItem('PNL_START_DATE') || '';
} catch (e) { /* ignore */ }

function setPnlPeriod(period) {
    _pnlPeriod = period || 'daily';
    document.querySelectorAll('.pnl-period-btn').forEach(function(btn) {
        btn.classList.toggle('pnl-tab-active', btn.dataset.pnlPeriod === _pnlPeriod);
    });
    loadPnl();
}

function setPnlStartDate(value) {
    _pnlStartDate = String(value || '').trim();
    try {
        if (_pnlStartDate) localStorage.setItem('PNL_START_DATE', _pnlStartDate);
        else localStorage.removeItem('PNL_START_DATE');
    } catch (e) { /* ignore */ }
    loadPnl();
}

function clearPnlStartDate() {
    var input = document.getElementById('pnl-start-date');
    if (input) input.value = '';
    setPnlStartDate('');
}

function renderPnlSummary(data) {
    var root = document.getElementById('pnl-summary');
    if (!root) return;
    var t = data && data.totals ? data.totals : {};
    var items = [
        ['净盈亏', fmtPnlHtml(t.net_pnl_usdt)],
        ['已实现', fmtPnlHtml(t.realized_pnl_usdt)],
        ['手续费', fmtPnlHtml(t.commission_usdt)],
        ['资金费', fmtPnlHtml(t.funding_fee_usdt)],
        ['返还', fmtPnlHtml(t.rebate_usdt)],
        ['流水', '<span class="font-mono text-xs text-text-primary">' + escHtml(String(t.event_count || 0)) + '</span>'],
    ];
    root.innerHTML = items.map(function(item) {
        return '<div class="flex flex-col gap-0.5 rounded-md border border-border/80 bg-surface-light/[0.24] px-3 py-2">'
            + '<span class="text-text-muted text-[10px] uppercase tracking-wider">' + item[0] + '</span>'
            + '<div>' + item[1] + '</div>'
            + '</div>';
    }).join('');
}

function isoWeekLabel(d) {
    var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    var day = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - day);
    var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    var week = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    return date.getUTCFullYear() + '-W' + String(week).padStart(2, '0');
}

function ymd(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function ym(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function emptyPnlRow(period) {
    return {
        period: period,
        net_pnl_usdt: 0,
        realized_pnl_usdt: 0,
        commission_usdt: 0,
        funding_fee_usdt: 0,
        rebate_usdt: 0,
        event_count: 0,
    };
}

function buildPnlDisplayRows(data) {
    var rows = (data && data.rows) || [];
    var byPeriod = {};
    rows.forEach(function(row) { byPeriod[row.period] = row; });
    var out = [];
    var now = new Date();
    var minDate = _pnlStartDate ? new Date(_pnlStartDate + 'T00:00:00') : null;
    if (_pnlPeriod === 'daily') {
        for (var i = 0; i < 90; i++) {
            var d = new Date(now);
            d.setDate(now.getDate() - i);
            if (minDate && d < minDate) break;
            var k = ymd(d);
            out.push(byPeriod[k] || emptyPnlRow(k));
        }
        return out;
    }
    if (_pnlPeriod === 'weekly') {
        for (var w = 0; w < 14; w++) {
            var dw = new Date(now);
            dw.setDate(now.getDate() - w * 7);
            if (minDate && dw < minDate) break;
            var wk = isoWeekLabel(dw);
            if (!out.length || out[out.length - 1].period !== wk) {
                out.push(byPeriod[wk] || emptyPnlRow(wk));
            }
        }
        return out;
    }
    for (var m = 0; m < 6; m++) {
        var dm = new Date(now.getFullYear(), now.getMonth() - m, 1);
        if (minDate && new Date(dm.getFullYear(), dm.getMonth() + 1, 0) < minDate) break;
        var mk = ym(dm);
        out.push(byPeriod[mk] || emptyPnlRow(mk));
    }
    return out;
}

function renderPnlCalendar(data) {
    var root = document.getElementById('pnl-calendar');
    if (!root) return;
    var rows = buildPnlDisplayRows(data);
    var hasEvents = rows.some(function(row) { return Number(row.event_count || 0) > 0; });
    if (!hasEvents) {
        root.innerHTML = '<div class="text-text-muted text-xs">暂无盈亏流水。点击“同步”从 Binance 拉取最近数据。</div>';
        return;
    }
    root.innerHTML = rows.map(function(row) {
        var net = Number(row.net_pnl_usdt || 0);
        var cls = pnlClass(net);
        var title = [
            '周期：' + row.period,
            '净盈亏：' + fmtSignedUsd(net, 2),
            '已实现：' + fmtSignedUsd(row.realized_pnl_usdt, 2),
            '手续费：' + fmtSignedUsd(row.commission_usdt, 2),
            '资金费：' + fmtSignedUsd(row.funding_fee_usdt, 2),
            '返还：' + fmtSignedUsd(row.rebate_usdt, 2),
        ].join('\n');
        return '<div class="pnl-dot-cell ' + cls + '" title="' + escHtml(title) + '">'
            + '<div class="flex items-center justify-between gap-2">'
            + '<span class="text-text-muted text-[11px] font-mono">' + escHtml(row.period) + '</span>'
            + '<span class="pnl-dot ' + cls + '"></span>'
            + '</div>'
            + '<div class="font-mono text-sm font-semibold" style="' + pnlColor(net) + '">' + escHtml(fmtSignedUsd(net, 2)) + '</div>'
            + '<div class="text-text-muted text-[10px]">流水 ' + escHtml(String(row.event_count || 0)) + '</div>'
            + '</div>';
    }).join('');
}

async function loadPnl() {
    try {
        var path = '/api/binance/pnl/summary?period=' + encodeURIComponent(_pnlPeriod) + '&days=90';
        if (_pnlStartDate) path += '&start_date=' + encodeURIComponent(_pnlStartDate);
        var data = await apiFetch(path);
        renderPnlSummary(data);
        renderPnlCalendar(data);
        var st = document.getElementById('pnl-sync-state');
        if (st) {
            var last = data.sync_state && data.sync_state.last_sync_at;
            var range = _pnlStartDate ? (' · 起始日期：' + _pnlStartDate) : '';
            st.textContent = (last ? ('上次同步：' + fmtTime(last)) : '尚未同步 Binance income 流水') + range;
        }
    } catch (e) {
        document.getElementById('pnl-summary').innerHTML =
            '<div style="color:var(--neon-red);font-size:0.75rem">读取盈亏失败：' + escHtml(e.message) + '</div>';
        document.getElementById('pnl-calendar').innerHTML = '';
    }
}

async function syncPnl() {
    var btn = document.getElementById('btn-pnl-sync');
    try {
        if (!sessionStorage.getItem('PROTOCOL_MAINTENANCE_TOKEN')) {
            var token = window.prompt('Protocol 维护令牌（未配置可留空）');
            if (token) sessionStorage.setItem('PROTOCOL_MAINTENANCE_TOKEN', token.trim());
        }
    } catch (e) { /* ignore */ }
    var old = btn ? btn.textContent : '';
    if (btn) {
        btn.disabled = true;
        btn.textContent = '同步中…';
    }
    try {
        var out = await apiFetch('/api/binance/pnl/sync?days=90', { method: 'POST' });
        showToast('PnL 同步完成：新增 ' + out.inserted + ' / 拉取 ' + out.fetched, true);
        await loadPnl();
    } catch (e) {
        showToast('PnL 同步失败：' + e.message, false);
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.textContent = old || '同步';
        }
    }
}

async function clearPnlCache() {
    var btn = document.getElementById('btn-pnl-clear');
    try {
        var token = window.prompt('请输入 Protocol 维护令牌，用于清理本地 PnL 缓存');
        if (!token || !token.trim()) {
            showToast('已取消清理：未输入令牌', false);
            return;
        }
        sessionStorage.setItem('PROTOCOL_MAINTENANCE_TOKEN', token.trim());
    } catch (e) {
        showToast('无法读取维护令牌', false);
        return;
    }
    if (!confirm('确定清理本地 PnL 缓存？\n这只会删除本地 income_events 缓存和同步状态，不会影响 Binance 真实流水。')) {
        return;
    }
    var old = btn ? btn.textContent : '';
    if (btn) {
        btn.disabled = true;
        btn.textContent = '清理中…';
    }
    try {
        var out = await apiFetch('/api/binance/pnl/clear-cache', { method: 'POST' });
        showToast('PnL 缓存已清理：流水 ' + out.deleted_events + ' 条', true);
        await loadPnl();
    } catch (e) {
        showToast('清理失败：' + e.message, false);
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.textContent = old || '清理缓存';
        }
    }
}

// ── Refresh all ───────────────────────────────────────────────────────────────

function refreshAll() {
    loadStatus();
    loadOpenPositions();
    loadPnl();
    loadSignals();
}

// ── Theme ─────────────────────────────────────────────────────────────────────

function toggleTheme() {
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = isDark ? '\u2600' : '\u263D';
}

(function initTheme() {
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-btn') && (document.getElementById('theme-btn').textContent = '\u2600');
    }
})();

// ── Init ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function() {
    tickHeaderClock();
    var startInput = document.getElementById('pnl-start-date');
    if (startInput && _pnlStartDate) startInput.value = _pnlStartDate;
    setInterval(tickHeaderClock, 30000);
    refreshAll();
    setInterval(function() {
        if (document.visibilityState === 'visible') {
            loadOpenPositions();
            loadStatus();
        }
    }, 30000);

    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
            loadOpenPositions();
            loadStatus();
        }
    });
});
